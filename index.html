<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>T-Shirt Mockup & Artwork Studio</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts: Inter & Roboto -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Roboto:wght@700&display=swap');
    
    body { font-family: 'Inter', sans-serif; background: #fff; overscroll-behavior-y: contain; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .studio-canvas-bg {
      background-color: #fff;
      background-image: linear-gradient(45deg, #eee 25%, transparent 25%), 
                        linear-gradient(-45deg, #eee 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #eee 75%), 
                        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }
    
    .font-roboto-bold { font-family: 'Roboto', sans-serif; font-weight: 700; }

    @keyframes slideIn {
      from { transform: translateY(-150%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .pwa-prompt-animate {
      animation: slideIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    /* Ensure touch-action is none to allow custom touch handling on canvas */
    .touch-none { touch-action: none; }
  </style>
</head>
<body class="antialiased overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const PWAInstallPrompt = () => {
      const [isVisible, setIsVisible] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isIOS, setIsIOS] = useState(false);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;
        const userAgent = window.navigator.userAgent.toLowerCase();
        const ios = /iphone|ipad|ipod/.test(userAgent);
        setIsIOS(ios);
        const handlePrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); setIsVisible(true); };
        window.addEventListener('beforeinstallprompt', handlePrompt);
        if (ios) { const timer = setTimeout(() => setIsVisible(true), 2500); return () => clearTimeout(timer); }
        return () => window.removeEventListener('beforeinstallprompt', handlePrompt);
      }, []);

      const handleInstall = async () => {
        if (isIOS) { alert("To install: Tap the 'Share' icon at the bottom of Safari, then select 'Add to Home Screen' from the list."); setIsVisible(false); return; }
        if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') { setDeferredPrompt(null); setIsVisible(false); } }
      };

      if (!isVisible) return null;
      return (
        <div className="fixed top-4 left-0 right-0 px-4 z-[9999] flex justify-center pointer-events-none">
          <div className="w-full max-w-sm bg-white/80 backdrop-blur-md border border-white/20 rounded-3xl p-3 flex items-center gap-3 pwa-prompt-animate pointer-events-auto">
            <div className="w-12 h-12 bg-black rounded-xl flex-shrink-0 flex items-center justify-center overflow-hidden shadow-sm">
               <img src="icon-192.png" alt="App Icon" className="w-10 h-10 object-contain" />
            </div>
            <div className="flex-1 min-w-0"><h3 className="text-slate-900 font-bold text-sm leading-tight truncate">Download this App</h3><p className="text-slate-500 text-[11px] leading-tight truncate">Get JeStudios Mockup tool on your screen</p></div>
            <div className="flex items-center gap-2"><button onClick={handleInstall} className="bg-blue-600 hover:bg-blue-700 active:scale-95 transition-all duration-100 text-white font-bold text-xs px-4 py-1.5 rounded-full uppercase tracking-tight">Get</button><button onClick={() => setIsVisible(false)} className="text-slate-400 hover:text-slate-600 transition-colors duration-100 p-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12" /></svg></button></div>
          </div>
        </div>
      );
    };

    const CANVAS_SIZE = 1080;
    const PRINT_WIDTH_1 = 320; const PRINT_TOP_1 = 320;
    const PRINT_WIDTH_2 = 290; const PRINT_TOP_2 = 510;
    const PRINT_WIDTH_3 = 188; const PRINT_TOP_3 = 246; const PRINT_LEFT_3 = 208;
    const A4 = { w: 2480, h: 3508 }; const A3 = { w: 3508, h: 4961 };

    const DRIVERS = [
      { id: 'george', image: 'drivers/george.webp', color: 'bg-[#00A19B]', team: 'mercedes' },
      { id: 'kimi', image: 'drivers/kimi.webp', color: 'bg-[#00A19B]', team: 'mercedes' },
      { id: 'max', image: 'drivers/max.webp', color: 'bg-[#0600EF]', team: 'redbull' },
      { id: 'isack', image: 'drivers/isack.webp', color: 'bg-[#0600EF]', team: 'redbull' },
      { id: 'charles', image: 'drivers/charles.webp', color: 'bg-[#E80020]', team: 'ferrari' },
      { id: 'lewis', image: 'drivers/lewis.webp', color: 'bg-[#E80020]', team: 'ferrari' },
      { id: 'lando', image: 'drivers/lando.webp', color: 'bg-[#FF8000]', team: 'mclaren' },
      { id: 'oscar', image: 'drivers/oscar.webp', color: 'bg-[#FF8000]', team: 'mclaren' },
      { id: 'fernando', image: 'drivers/fernando.webp', color: 'bg-[#229971]', team: 'aston-martin' },
      { id: 'lance', image: 'drivers/lance.webp', color: 'bg-[#229971]', team: 'aston-martin' },
      { id: 'alexander', image: 'drivers/alexander.webp', color: 'bg-[#005AFF]', team: 'williams' },
      { id: 'carlos', image: 'drivers/carlos.webp', color: 'bg-[#005AFF]', team: 'williams' },
      { id: 'pierre', image: 'drivers/pierre.webp', color: 'bg-[#FF9BFF]', team: 'alpine' },
      { id: 'franco', image: 'drivers/franco.webp', color: 'bg-[#FF9BFF]', team: 'alpine' },
      { id: 'esteban', image: 'drivers/esteban.webp', color: 'bg-[#B6BABD]', team: 'haas' },
      { id: 'oliver', image: 'drivers/oliver.webp', color: 'bg-[#B6BABD]', team: 'haas' },
      { id: 'liam', image: 'drivers/liam.webp', color: 'bg-[#6692FF]', team: 'vcarb' },
      { id: 'arvid', image: 'drivers/arvid.webp', color: 'bg-[#6692FF]', team: 'vcarb' },
      { id: 'nico', image: 'drivers/nico.webp', color: 'bg-[#800000]', team: 'sauber' }, 
      { id: 'gabriel', image: 'drivers/gabriel.webp', color: 'bg-[#800000]', team: 'sauber' }, 
      { id: 'sergio', image: 'drivers/sergio.webp', color: 'bg-[#333333]', team: 'cadillac' },
      { id: 'valtteri', image: 'drivers/valtteri.webp', color: 'bg-[#333333]', team: 'cadillac' }
    ];

    const Icon = ({ path, size = 18, className = "", fill = "none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={path} /></svg>
    );

    const Paths = {
      Upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
      Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
      Eraser: "M20 20H7L3 16C2 15 2 13 3 12L13 2C14 1 16 1 17 2L21 6C22 7 22 9 21 10L12 19",
      Invert: "M21 12a9 9 0 11-18 0 9 9 0 0118 0z M12 3v18",
      Edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z",
      Verify: "M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z",
      Close: "M18 6L6 18M6 6l12 12",
      Plus: "M12 5v14M5 12h14",
      Minus: "M5 12h14",
      Block: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M4.929 4.929l14.142 14.142",
      SnapLeft: "M15 18l-6-6 6-6",
      SnapRight: "M9 18l6-6-6-6",
      SnapUp: "M18 15l-6-6-6 6",
      SnapDown: "M18 9l-6 6-6-6"
    };

    const createProcessedImage = async (img) => {
      const temp = document.createElement('canvas'); temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d'); tCtx.drawImage(img, 0, 0);
      const imageData = tCtx.getImageData(0, 0, temp.width, temp.height); const data = imageData.data;
      const samples = []; const skip = Math.max(1, Math.floor(temp.width / 30));
      for (let x = 0; x < temp.width; x += skip) { samples.push({ r: data[(0 * temp.width + x) * 4], g: data[(0 * temp.width + x) * 4 + 1], b: data[(0 * temp.width + x) * 4 + 2] }); samples.push({ r: data[((temp.height-1) * temp.width + x) * 4], g: data[((temp.height-1) * temp.width + x) * 4 + 1], b: data[((temp.height-1) * temp.width + x) * 4 + 2] }); }
      const counts = {}; samples.forEach(c => { const k = `${Math.floor(c.r/8)},${Math.floor(c.g/8)},${Math.floor(c.b/8)}`; counts[k] = (counts[k]||0)+1; });
      const topColorKey = Object.keys(counts).length > 0 ? Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b) : "255,255,255";
      const [bgR, bgG, bgB] = topColorKey.split(',').map(v => v * 8);
      for (let i = 0; i < data.length; i += 4) { const d = (Math.abs(data[i]-bgR) + Math.abs(data[i+1]-bgG) + Math.abs(data[i+2]-bgB)) / 3; if (d < 35) data[i+3] = 0; else if (d < 55) data[i+3] = ((d-35)/20)*255; }
      tCtx.putImageData(imageData, 0, 0); return new Promise(r => { const o = new Image(); o.onload = () => r(o); o.src = temp.toDataURL(); });
    };

    const detectContentBounds = (img) => {
      const temp = document.createElement('canvas'); temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d'); tCtx.drawImage(img, 0, 0);
      const pixels = tCtx.getImageData(0, 0, img.width, img.height).data;
      let minX = img.width, minY = img.height, maxX = 0, maxY = 0, found = false;
      for (let y = 0; y < img.height; y += 10) { for (let x = 0; x < img.width; x += 10) { if (pixels[(y * img.width + x) * 4 + 3] > 15) { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); found = true; } } }
      return found ? { x: minX, y: minY, w: maxX - minX, h: maxY - minY } : { x: 0, y: 0, w: img.width, h: img.height };
    };

    function ArtworkStudio({ rawImage, initialTransform, initialPaper, isBgRemoved, isInverted, onConfirm, onCancel }) {
      const canvasRef = useRef(null);
      const eraserMaskRef = useRef(null); 
      const [images, setImages] = useState({ original: null, processed: null });
      const [transform, setTransform] = useState(initialTransform);
      const [paper, setPaper] = useState(initialPaper);
      const [isEraserActive, setIsEraserActive] = useState(false);
      const [brushSize, setBrushSize] = useState(40);
      
      const isDrawing = useRef(false);
      const isDragging = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });
      const startDist = useRef(0);
      const startScale = useRef(1);
      const baseScale = useRef(initialTransform.scale);

      useEffect(() => {
        const img = new Image();
        img.onload = async () => {
          const proc = await createProcessedImage(img);
          setImages({ original: img, processed: proc });
          const mask = document.createElement('canvas');
          mask.width = img.width; mask.height = img.height;
          eraserMaskRef.current = mask;
        };
        img.src = rawImage;
      }, [rawImage]);

      const render = useCallback(() => {
        const canvas = canvasRef.current; if (!canvas || !images.original) return;
        const ctx = canvas.getContext('2d'); 
        const target = paper === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
        canvas.width = target.w; canvas.height = target.h;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        ctx.save();
        ctx.translate(transform.x, transform.y); 
        ctx.scale(transform.scale, transform.scale);
        
        if (isInverted) ctx.filter = 'invert(1)';
        const active = isBgRemoved ? images.processed : images.original;
        
        ctx.drawImage(active, -active.width/2, -active.height/2);
        
        if (eraserMaskRef.current) {
          ctx.globalCompositeOperation = 'destination-out';
          ctx.drawImage(eraserMaskRef.current, -active.width/2, -active.height/2);
          ctx.globalCompositeOperation = 'source-over';
        }
        
        if (isInverted) ctx.filter = 'none';
        ctx.restore();
      }, [images, transform, isBgRemoved, isInverted, paper]);

      useEffect(() => { render(); }, [render]);

      const getCoord = (e) => {
        if (!e) return { x: 0, y: 0, localX: 0, localY: 0, ratio: 1 };
        const rect = canvasRef.current.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const ratio = canvasRef.current.width / rect.width;
        
        const canvasX = (clientX - rect.left) * ratio;
        const canvasY = (clientY - rect.top) * ratio;
        
        const localX = (canvasX - transform.x) / transform.scale + (images.original.width / 2);
        const localY = (canvasY - transform.y) / transform.scale + (images.original.height / 2);
        
        return { x: clientX, y: clientY, localX, localY, ratio };
      };

      const handleInteraction = (type, e) => {
        if (!canvasRef.current || !images.original) return;
        
        // Critical for preventing ghost scrolls and browser navigation
        if (e.cancelable) e.preventDefault();
        if (e.stopPropagation) e.stopPropagation();

        if (type === 'end') {
          isDragging.current = false;
          isDrawing.current = false;
          return;
        }

        const { x, y, localX, localY, ratio } = getCoord(e);

        if (type === 'start') {
          if (isEraserActive) {
            isDrawing.current = true;
            const mCtx = eraserMaskRef.current.getContext('2d');
            mCtx.beginPath();
            mCtx.moveTo(localX, localY);
          } else {
            if (e.touches && e.touches.length === 2) {
              startDist.current = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
              startScale.current = transform.scale;
            } else {
              isDragging.current = true;
              lastPos.current = { x, y };
            }
          }
        } else if (type === 'move') {
          if (isEraserActive && isDrawing.current) {
            const mCtx = eraserMaskRef.current.getContext('2d');
            mCtx.lineTo(localX, localY);
            mCtx.strokeStyle = 'black';
            mCtx.lineWidth = brushSize / transform.scale;
            mCtx.lineCap = 'round';
            mCtx.stroke();
            render();
          } else if (isDragging.current) {
            if (e.touches && e.touches.length === 2) {
              const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
              setTransform(p => ({ ...p, scale: startScale.current * (dist / startDist.current) }));
            } else {
              setTransform(p => ({ ...p, x: p.x + (x - lastPos.current.x) * ratio, y: p.y + (y - lastPos.current.y) * ratio }));
              lastPos.current = { x, y };
            }
          }
        }
      };

      const handleFinalize = () => {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = images.original.width;
        finalCanvas.height = images.original.height;
        const fCtx = finalCanvas.getContext('2d');
        const active = isBgRemoved ? images.processed : images.original;
        fCtx.drawImage(active, 0, 0);
        fCtx.globalCompositeOperation = 'destination-out';
        fCtx.drawImage(eraserMaskRef.current, 0, 0);
        onConfirm(transform, paper, finalCanvas.toDataURL());
      };

      return (
        <div className="fixed inset-0 z-[100] bg-slate-100 flex flex-col md:flex-row animate-in fade-in duration-150 touch-none">
          <div className="flex-1 bg-[#e2e8f0] relative flex items-center justify-center overflow-hidden p-4 md:p-8" 
               onMouseMove={(e) => handleInteraction('move', e)} 
               onMouseUp={(e) => handleInteraction('end', e)} 
               onMouseLeave={(e) => handleInteraction('end', e)}
               onTouchMove={(e) => handleInteraction('move', e)}
               onTouchEnd={(e) => handleInteraction('end', e)}>
            <div className="relative w-full h-full flex items-center justify-center">
              <canvas ref={canvasRef} 
                      className={`max-w-full max-h-full object-contain bg-white studio-canvas-bg rounded-sm touch-none ${isEraserActive ? 'cursor-crosshair' : 'cursor-grab active:cursor-grabbing'}`} 
                      onTouchStart={(e) => handleInteraction('start', e)} 
                      onMouseDown={(e) => handleInteraction('start', e)} />
            </div>
            
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-black/85 backdrop-blur-md px-3 py-2 rounded-xl z-30">
               <button onClick={() => setTransform(p => ({...p, scale: p.scale*0.99}))} className="w-8 h-8 flex items-center justify-center bg-white/10 hover:bg-white/20 text-white rounded-lg active:scale-95 transition-colors duration-100"><Icon path={Paths.Minus} size={16}/></button>
               <div className="flex flex-col items-center w-12"><span className="text-white/50 text-[6px] font-black uppercase mb-0.5">Scale</span><input type="number" value={Math.round((transform.scale / baseScale.current) * 100)} onChange={e => setTransform(p => ({...p, scale: (e.target.value/100)*baseScale.current}))} className="w-full bg-transparent text-white text-center font-bold text-xs focus:outline-none" /></div>
               <button onClick={() => setTransform(p => ({...p, scale: p.scale*1.01}))} className="w-8 h-8 flex items-center justify-center bg-white/10 hover:bg-white/20 text-white rounded-lg active:scale-95 transition-colors duration-100"><Icon path={Paths.Plus} size={16}/></button>
            </div>
          </div>
          
          <div className="w-full md:w-[260px] bg-white p-4 flex flex-col justify-between border-l border-slate-200 z-40 relative">
            <div className="space-y-6">
              <div className="flex justify-between items-center pb-2 border-b"><h2 className="font-roboto-bold text-sm text-slate-800 uppercase tracking-tighter">Edit Design</h2><button onClick={onCancel} className="p-1.5 bg-slate-50 rounded-full hover:bg-slate-200 duration-100"><Icon path={Paths.Close} size={14} /></button></div>
              <div>
                <span className="text-[10px] font-black uppercase text-slate-400 block mb-2">Paper</span>
                <div className="flex bg-slate-100 p-1 rounded-lg">{['A4', 'A3'].map(size => (<button key={size} onClick={() => setPaper(size)} className={`flex-1 py-1.5 text-[10px] font-black uppercase rounded-md transition-all duration-100 ${paper === size ? 'bg-white text-black shadow-sm' : 'text-slate-400'}`}>{size}</button>))}</div>
              </div>
              <div>
                <div className="flex justify-between items-center mb-2">
                   <span className="text-[10px] font-black uppercase text-slate-400">Eraser Mode</span>
                   <button onClick={() => setIsEraserActive(!isEraserActive)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${isEraserActive ? 'bg-red-500 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon path={Paths.Eraser} size={16} /></button>
                </div>
                {isEraserActive && (
                  <div className="space-y-1.5 animate-in fade-in slide-in-from-top-1 duration-200">
                    <div className="flex justify-between text-[8px] font-black uppercase text-slate-400"><span>Brush Size</span><span>{brushSize}px</span></div>
                    <input type="range" min="10" max="150" value={brushSize} onChange={(e) => setBrushSize(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-red-500" />
                  </div>
                )}
              </div>
            </div>
            <button onClick={handleFinalize} className="w-full py-3 bg-black text-white rounded-lg font-black uppercase tracking-[0.1em] text-[10px] active:scale-95 transition-all duration-100">Apply Changes</button>
          </div>
        </div>
      );
    }

    function App() {
      const [garmentColor, setGarmentColor] = useState('black');
      const [selectedDriver, setSelectedDriver] = useState(null);
      const [uploadedImage, setUploadedImage] = useState(null); 
      const [rawImage, setRawImage] = useState(null); 
      const [processedImage, setProcessedImage] = useState(null); 
      const [isStudioOpen, setIsStudioOpen] = useState(false);
      const [isBgRemoved, setIsBgRemoved] = useState(true);
      const [isInverted, setIsInverted] = useState(false);
      const [fitMode, setFitMode] = useState('width');
      const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
      const [paperSize, setPaperSize] = useState("A4");
      const [editorScale, setEditorScale] = useState(1);
      const [activeIndex, setActiveIndex] = useState(0);
      const [isDriversExpanded, setIsDriversExpanded] = useState(false);
      const [isDragOver, setIsDragOver] = useState(false);

      const dragCounter = useRef(0);
      const fileInputRef = useRef(null);
      const carouselRef = useRef(null);
      const grabRef = useRef({ isDown: false, startX: 0, startY: 0, scrollLeft: 0, scrollTop: 0 });

      const VIEWS = ['front', 'back', 'detail'];
      const DOWNLOAD_VIEWS = ['front', 'back', 'detail', 'fabric', 'size'];

      useEffect(() => {
        const updateScale = () => { if (carouselRef.current) { const canvas = carouselRef.current.querySelector('.canvas-wrapper'); if (canvas) setEditorScale(canvas.getBoundingClientRect().height / CANVAS_SIZE); } };
        updateScale(); window.addEventListener('resize', updateScale);
        const obs = new ResizeObserver(updateScale); if (carouselRef.current) obs.observe(carouselRef.current);
        return () => { window.removeEventListener('resize', updateScale); obs.disconnect(); };
      }, [isStudioOpen, selectedDriver]);

      const handleCarouselScroll = (e) => {
        if (!e.target || e.target.clientWidth === 0 || e.target.clientHeight === 0) return;
        const isVert = window.innerWidth < 768;
        const index = isVert ? Math.round(e.target.scrollTop / e.target.clientHeight) : Math.round(e.target.scrollLeft / e.target.clientWidth);
        if (index !== activeIndex && index >= 0 && index < VIEWS.length) setActiveIndex(index);
      };

      const handleGrabStart = (e) => {
        grabRef.current.isDown = true;
        grabRef.current.startX = (e.touches ? e.touches[0].pageX : e.pageX) - carouselRef.current.offsetLeft;
        grabRef.current.startY = (e.touches ? e.touches[0].pageY : e.pageY) - carouselRef.current.offsetTop;
        grabRef.current.scrollLeft = carouselRef.current.scrollLeft;
        grabRef.current.scrollTop = carouselRef.current.scrollTop;
      };

      const handleGrabMove = (e) => {
        if (!grabRef.current.isDown) return;
        if (!e.touches) e.preventDefault();
        const curX = (e.touches ? e.touches[0].pageX : e.pageX) - carouselRef.current.offsetLeft;
        const curY = (e.touches ? e.touches[0].pageY : e.pageY) - carouselRef.current.offsetTop;
        if (window.innerWidth < 768) { carouselRef.current.scrollTop = grabRef.current.scrollTop - (curY - grabRef.current.startY) * 1.5; } 
        else { carouselRef.current.scrollLeft = grabRef.current.scrollLeft - (curX - grabRef.current.startX) * 1.5; }
      };

      const handleGrabEnd = () => { grabRef.current.isDown = false; };

      useEffect(() => {
        if (!rawImage) return;
        const gen = async () => {
          const imgObj = new Image(); imgObj.onload = () => {
            const activeImg = isBgRemoved ? processedImage : imgObj; if (!activeImg) return;
            const target = paperSize === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
            const tmp = document.createElement('canvas'); tmp.width = target.w; tmp.height = target.h;
            const c = tmp.getContext('2d'); c.save(); c.translate(transform.x, transform.y); c.scale(transform.scale, transform.scale);
            if (isInverted) c.filter = 'invert(1)'; c.drawImage(activeImg, -activeImg.width/2, -activeImg.height/2);
            if (isInverted) c.filter = 'none'; c.restore(); setUploadedImage(tmp.toDataURL());
          };
          imgObj.src = rawImage;
        };
        gen();
      }, [rawImage, processedImage, transform, isBgRemoved, isInverted, paperSize]);

      const processFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader(); reader.onload = async (ev) => {
          const img = new Image(); img.onload = async () => {
            setRawImage(ev.target.result); const proc = await createProcessedImage(img); setProcessedImage(proc);
            const bounds = detectContentBounds(proc); const targetSize = (bounds.w > bounds.h) ? { w: A4.w, h: A4.h, name: "A4" } : { w: A3.w, h: A3.h, name: "A3" };
            const sW = targetSize.w / bounds.w; const sH = targetSize.h / bounds.h; const initialScale = Math.min(sW, sH);
            setPaperSize(targetSize.name); setTransform({ x: targetSize.w / 2 - (bounds.x + bounds.w / 2 - img.width / 2) * initialScale, y: targetSize.h / 2 - (bounds.y + bounds.h / 2 - img.height / 2) * initialScale, scale: initialScale });
            setFitMode(sW < sH ? 'width' : 'height'); setIsBgRemoved(true); setIsInverted(false);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSnap = (direction) => {
        const activeImg = isBgRemoved ? processedImage : null;
        const imgRef = activeImg || (rawImage ? new Image() : null);
        if (!imgRef) return;
        const applySnap = (readyImg) => {
          const target = paperSize === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
          const bounds = detectContentBounds(readyImg);
          const sw = readyImg.width * transform.scale;
          const sh = readyImg.height * transform.scale;
          setTransform(p => {
            let nx = p.x, ny = p.y;
            if (direction === 'left') nx = (sw / 2) - bounds.x * transform.scale;
            if (direction === 'right') nx = target.w - (sw / 2) + (readyImg.width - (bounds.x + bounds.w)) * transform.scale;
            if (direction === 'up') ny = (sh / 2) - bounds.y * transform.scale;
            if (direction === 'down') ny = target.h - (sh / 2) + (readyImg.height - (bounds.y + bounds.h)) * transform.scale;
            return { ...p, x: nx, y: ny };
          });
        };
        if (activeImg) { applySnap(activeImg); } 
        else if (rawImage) { const tempImg = new Image(); tempImg.onload = () => applySnap(tempImg); tempImg.src = rawImage; }
      };

      const downloadMockup = async () => {
        for (const type of DOWNLOAD_VIEWS) {
          if (type === 'back' && !selectedDriver) continue;
          const canvas = document.createElement('canvas'); canvas.width = CANVAS_SIZE; canvas.height = CANVAS_SIZE;
          const ctx = canvas.getContext('2d'); ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, canvas.width, canvas.height);
          let src = `garment/garment-${garmentColor}.png`; let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
          if (type === 'back') { src = `garment/garment-${garmentColor}-${selectedDriver}.png`; pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 }; }
          else if (type === 'detail') { src = `garment/garment-${garmentColor}-detail.png`; pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; }
          else if (type === 'fabric') { src = `garment-${garmentColor}-fabric.png`; } else if (type === 'size') { src = `size-chart.png`; }
          const gImg = new Image(); await new Promise(r => { gImg.onload = r; gImg.onerror = r; gImg.src = src; });
          if (gImg.naturalWidth) ctx.drawImage(gImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
          if (type === 'front' && selectedDriver) {
            const dImg = new Image(); await new Promise(r => { dImg.onload = r; dImg.onerror = r; dImg.src = DRIVERS.find(d=>d.id===selectedDriver).image; });
            if (dImg.naturalWidth) { const dw = 650; const dh = (dImg.naturalHeight/dImg.naturalWidth)*dw; ctx.drawImage(dImg, -85, CANVAS_SIZE - dh - (CANVAS_SIZE * -1.30), dw, dh); }
          }
          if (uploadedImage && (type === 'front' || type === 'back' || type === 'detail')) {
            const aImg = new Image(); await new Promise(r => { aImg.onload = r; aImg.src = uploadedImage; });
            ctx.globalAlpha = 0.9;
            ctx.globalCompositeOperation = garmentColor === 'white' ? 'multiply' : 'screen';
            ctx.drawImage(aImg, pos.l, pos.t, pos.w, (aImg.naturalHeight/aImg.naturalWidth)*pos.w);
            ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0;
          }
          const link = document.createElement('a'); link.download = `Jestudios_${type}_${Date.now()}.png`; link.href = canvas.toDataURL('image/png'); link.click();
          await new Promise(r => setTimeout(r, 400));
        }
      };

      const handleDragEvent = (type, e) => { e.preventDefault(); if (type === 'enter') dragCounter.current++; else if (type === 'leave') dragCounter.current--; else if (type === 'drop') { dragCounter.current = 0; setIsDragOver(false); if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]); return; } setIsDragOver(dragCounter.current > 0); };

      const renderView = (type) => {
        let src = `garment/garment-${garmentColor}.png`; let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
        const wrapperClass = "flex-none w-full md:w-auto h-auto md:h-full md:max-h-[65vh] aspect-square flex items-center justify-center p-2 md:p-4";
        if (type === 'back' && !selectedDriver) return (<div key={type} className={wrapperClass}><div className="canvas-wrapper relative bg-[#f8fafc] w-full h-full flex flex-col items-center justify-center rounded-2xl border border-slate-200"><span className="text-slate-400 font-medium text-[10px] text-center px-4">Select driver to view back</span></div></div>);
        if (type === 'back') { src = `garment/garment-${garmentColor}-${selectedDriver}.png`; pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 }; }
        else if (type === 'detail') { src = `garment/garment-${garmentColor}-detail.png`; pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; }
        const showArt = uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail');
        return (
          <div key={type} className={wrapperClass}>
            <div className="canvas-wrapper relative bg-white w-full h-full overflow-hidden rounded-2xl border border-slate-100">
              <div style={{ width: CANVAS_SIZE, height: CANVAS_SIZE, transform: `scale(${editorScale})`, transformOrigin: 'top left', position: 'absolute', top: 0, left: 0 }}>
                <img src={src} className="w-full h-full absolute inset-0 object-cover pointer-events-none" />
                {type === 'front' && selectedDriver && <img src={DRIVERS.find(d=>d.id===selectedDriver).image} className="absolute pointer-events-none" style={{ width: 650, left: -85, bottom: '-130%', zIndex: 5 }} />}
                {showArt && <div className="absolute" style={{ left: pos.l, top: pos.t, width: pos.w, zIndex: 10 }}><canvas ref={el => { if (el && uploadedImage) { const c = el.getContext('2d'); const i = new Image(); i.onload = () => { el.width = pos.w; el.height = (i.naturalHeight/i.naturalWidth)*pos.w; c.globalAlpha = 0.9; c.globalCompositeOperation = garmentColor === 'white' ? 'multiply' : 'screen'; c.drawImage(i, 0, 0, el.width, el.height); }; i.src = uploadedImage; } }} className="w-full pointer-events-none" /></div>}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="h-screen w-full flex flex-col bg-slate-50 overflow-hidden relative" onDragEnter={(e) => handleDragEvent('enter', e)} onDragOver={(e) => e.preventDefault()} onDragLeave={(e) => handleDragEvent('leave', e)} onDrop={(e) => handleDragEvent('drop', e)}>
          {isDragOver && <div className="absolute inset-0 z-[9999] bg-blue-500/10 backdrop-blur-[2px] m-3 border-4 border-dashed border-blue-500 rounded-3xl flex items-center justify-center pointer-events-none transition-all duration-100"><div className="bg-white px-8 py-6 rounded-3xl flex flex-col items-center gap-4 animate-in zoom-in-95 duration-100"><div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center"><Icon path={Paths.Upload} size={28} className="text-blue-500" /></div><div className="text-center"><h3 className="font-roboto-bold text-xl text-slate-800">Drop Design</h3><p className="text-slate-500 text-sm mt-1">Release to upload</p></div></div></div>}
          <PWAInstallPrompt />
          {isStudioOpen && <ArtworkStudio rawImage={rawImage} initialTransform={transform} initialPaper={paperSize} isBgRemoved={isBgRemoved} isInverted={isInverted} onConfirm={(t, p, newRaw) => { setTransform(t); setPaperSize(p); if (newRaw) { setRawImage(newRaw); const img = new Image(); img.onload = () => setProcessedImage(img); img.src = newRaw; } setIsStudioOpen(false); }} onCancel={() => setIsStudioOpen(false)} />}
          
          <div className="flex-1 w-full relative flex flex-col items-center justify-center bg-[#f8fafc] overflow-hidden">
             <div ref={carouselRef} onScroll={handleCarouselScroll} onMouseDown={handleGrabStart} onMouseMove={handleGrabMove} onMouseUp={handleGrabEnd} onMouseLeave={handleGrabEnd} onTouchStart={handleGrabStart} onTouchMove={handleGrabMove} onTouchEnd={handleGrabEnd} className="flex flex-col md:flex-row w-full h-full overflow-y-auto md:overflow-y-hidden md:overflow-x-auto hide-scrollbar items-center justify-start cursor-grab active:cursor-grabbing px-4">
                {VIEWS.map((v) => renderView(v))}
             </div>
             <div className="absolute bottom-6 left-0 right-0 flex justify-center gap-1.5 z-10 pointer-events-none md:hidden">
                {VIEWS.map((_, i) => (<div key={i} className={`h-1 rounded-full transition-all duration-150 ${i === activeIndex ? 'w-4 bg-blue-500' : 'w-1 bg-slate-300'}`} />))}
             </div>
          </div>

          <div className="w-full bg-white border-t border-slate-200 z-40 shrink-0">
            <div className="flex flex-col gap-3 p-3 w-full max-w-screen-2xl mx-auto">
              <div className="flex items-center gap-3 w-full">
                <div className="flex gap-2 shrink-0 border-r pr-3 border-slate-100">{['black', 'white'].map(c => (<button key={c} onClick={() => setGarmentColor(c)} className={`w-8 h-8 rounded-full border-2 transition-transform duration-100 ${c === 'black' ? 'bg-black' : 'bg-[#f8fafc]'} ${garmentColor === c ? 'border-black scale-110' : 'border-slate-100'}`} />))}</div>
                <div className="flex-1 overflow-x-auto hide-scrollbar flex gap-2 py-1">
                   <button onClick={() => setSelectedDriver(null)} className={`relative w-9 h-9 rounded-full shrink-0 flex items-center justify-center transition-all duration-100 border ${selectedDriver === null ? 'border-black scale-110 z-10 bg-slate-100' : 'opacity-70 border-slate-200 bg-white'}`} title="No Driver"><Icon path={Paths.Block} size={18} className="text-slate-400" /></button>
                   {DRIVERS.map(d => (<button key={d.id} onClick={() => setSelectedDriver(d.id)} className={`relative w-9 h-9 rounded-full shrink-0 transition-all duration-100 overflow-hidden border ${selectedDriver === d.id ? 'border-black scale-110 z-10' : 'opacity-70 border-slate-200'}`}><div className={`absolute inset-0 ${d.color}`} /><img src={d.image} className="absolute top-[10%] w-[40px] left-1/2 -translate-x-1/2" /></button>))}
                </div>
              </div>
              <div className="flex items-center gap-2 w-full overflow-x-auto hide-scrollbar">
                <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={(e) => processFile(e.target.files[0])} />
                <button title="Upload" onClick={() => fileInputRef.current.click()} className="flex-1 min-w-[40px] h-10 border rounded-xl flex items-center justify-center bg-white hover:bg-slate-50 duration-100 overflow-hidden">{!rawImage ? <Icon path={Paths.Upload} size={16} className="text-slate-600" /> : <img src={uploadedImage} className="w-full h-full object-contain p-1" />}</button>
                <div className="flex h-10 border rounded-xl bg-white overflow-hidden">
                   <button onClick={() => handleSnap('left')} className="w-10 flex items-center justify-center border-r hover:bg-slate-50"><Icon path={Paths.SnapLeft} size={14} /></button>
                   <button onClick={() => handleSnap('right')} className="w-10 flex items-center justify-center border-r hover:bg-slate-50"><Icon path={Paths.SnapRight} size={14} /></button>
                   <button onClick={() => handleSnap('up')} className="w-10 flex items-center justify-center border-r hover:bg-slate-50"><Icon path={Paths.SnapUp} size={14} /></button>
                   <button onClick={() => handleSnap('down')} className="w-10 flex items-center justify-center hover:bg-slate-50"><Icon path={Paths.SnapDown} size={14} /></button>
                </div>
                <button onClick={() => setIsBgRemoved(!isBgRemoved)} className={`flex-1 min-w-[40px] h-10 border rounded-xl flex items-center justify-center duration-100 ${isBgRemoved ? 'bg-slate-100 text-black' : 'text-slate-400'}`} title="Remove BG"><Icon path={Paths.Eraser} size={16} /></button>
                <button onClick={() => setIsInverted(!isInverted)} className={`flex-1 min-w-[40px] h-10 border rounded-xl flex items-center justify-center duration-100 ${isInverted ? 'bg-slate-100 text-black' : 'text-slate-400'}`} title="Invert Colors"><Icon path={Paths.Invert} size={16} /></button>
                <button onClick={() => setIsStudioOpen(true)} className="flex-1 min-w-[40px] h-10 border rounded-xl bg-white flex items-center justify-center duration-100" title="Edit Design"><Icon path={Paths.Edit} size={16} /></button>
                <button onClick={downloadMockup} className="flex-1 min-w-[40px] h-10 bg-black text-white rounded-xl flex items-center justify-center active:scale-95 duration-100" title="Download"><Icon path={Paths.Download} size={16} /></button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
