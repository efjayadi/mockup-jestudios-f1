<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>T-Shirt Mockup & Artwork Studio</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts: Inter & Roboto -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Roboto:wght@700&display=swap');
    
    body { font-family: 'Inter', sans-serif; background: #fff; overscroll-behavior-y: contain; }
    
    /* Custom Scrollbar for the expanded driver grid */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Localized Checkerboard strictly for the canvas area */
    .studio-canvas-bg {
      background-color: #fff;
      background-image: linear-gradient(45deg, #eee 25%, transparent 25%), 
                        linear-gradient(-45deg, #eee 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #eee 75%), 
                        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }
    
    .font-roboto-bold { font-family: 'Roboto', sans-serif; font-weight: 700; }

    /* PWA Prompt Animation */
    @keyframes slideIn {
      from { transform: translateY(-150%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .pwa-prompt-animate {
      animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="antialiased overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- Custom PWA Install Prompt Component ---
    const PWAInstallPrompt = () => {
      const [isVisible, setIsVisible] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isIOS, setIsIOS] = useState(false);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;

        const userAgent = window.navigator.userAgent.toLowerCase();
        const ios = /iphone|ipad|ipod/.test(userAgent);
        setIsIOS(ios);

        const handlePrompt = (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
          setIsVisible(true);
        };

        window.addEventListener('beforeinstallprompt', handlePrompt);

        if (ios) {
          const timer = setTimeout(() => {
            setIsVisible(true);
          }, 2500);
          return () => clearTimeout(timer);
        }

        return () => window.removeEventListener('beforeinstallprompt', handlePrompt);
      }, []);

      const handleInstall = async () => {
        if (isIOS) {
          alert("To install: Tap the 'Share' icon at the bottom of Safari, then select 'Add to Home Screen' from the list.");
          setIsVisible(false);
          return;
        }

        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            setDeferredPrompt(null);
            setIsVisible(false);
          }
        }
      };

      if (!isVisible) return null;

      return (
        <div className="fixed top-4 left-0 right-0 px-4 z-[9999] flex justify-center pointer-events-none">
          <div className="w-full max-w-sm bg-white/80 backdrop-blur-md border border-white/20 shadow-2xl rounded-3xl p-3 flex items-center gap-3 pwa-prompt-animate pointer-events-auto">
            <div className="w-12 h-12 bg-black rounded-xl flex-shrink-0 flex items-center justify-center overflow-hidden shadow-md">
               <img src="icon-192.png" alt="App Icon" className="w-10 h-10 object-contain" />
            </div>
            <div className="flex-1 min-w-0">
              <h3 className="text-slate-900 font-bold text-sm leading-tight truncate">Download this App</h3>
              <p className="text-slate-500 text-[11px] leading-tight truncate">Get JeStudios Mockup tool on your screen</p>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={handleInstall} className="bg-blue-600 hover:bg-blue-700 active:scale-95 transition-all text-white font-bold text-xs px-4 py-1.5 rounded-full uppercase tracking-tight">Get</button>
              <button onClick={() => setIsVisible(false)} className="text-slate-400 hover:text-slate-600 transition-colors p-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12" /></svg></button>
            </div>
          </div>
        </div>
      );
    };

    const CANVAS_SIZE = 1080;
    const PRINT_WIDTH_1 = 320;
    const PRINT_TOP_1 = 320;
    const PRINT_WIDTH_2 = 290;
    const PRINT_TOP_2 = 510;
    const PRINT_WIDTH_3 = 188;
    const PRINT_TOP_3 = 246;
    const PRINT_LEFT_3 = 208;

    const A4 = { w: 2480, h: 3508 };
    const A3 = { w: 3508, h: 4961 };

    const DRIVERS = [
      { id: 'george', image: 'drivers/george.webp', color: 'bg-[#00A19B]', team: 'mercedes' },
      { id: 'kimi', image: 'drivers/kimi.webp', color: 'bg-[#00A19B]', team: 'mercedes' },
      { id: 'max', image: 'drivers/max.webp', color: 'bg-[#0600EF]', team: 'redbull' },
      { id: 'isack', image: 'drivers/isack.webp', color: 'bg-[#0600EF]', team: 'redbull' },
      { id: 'charles', image: 'drivers/charles.webp', color: 'bg-[#E80020]', team: 'ferrari' },
      { id: 'lewis', image: 'drivers/lewis.webp', color: 'bg-[#E80020]', team: 'ferrari' },
      { id: 'lando', image: 'drivers/lando.webp', color: 'bg-[#FF8000]', team: 'mclaren' },
      { id: 'oscar', image: 'drivers/oscar.webp', color: 'bg-[#FF8000]', team: 'mclaren' },
      { id: 'fernando', image: 'drivers/fernando.webp', color: 'bg-[#229971]', team: 'aston-martin' },
      { id: 'lance', image: 'drivers/lance.webp', color: 'bg-[#229971]', team: 'aston-martin' },
      { id: 'alexander', image: 'drivers/alexander.webp', color: 'bg-[#005AFF]', team: 'williams' },
      { id: 'carlos', image: 'drivers/carlos.webp', color: 'bg-[#005AFF]', team: 'williams' },
      { id: 'pierre', image: 'drivers/pierre.webp', color: 'bg-[#FF9BFF]', team: 'alpine' },
      { id: 'franco', image: 'drivers/franco.webp', color: 'bg-[#FF9BFF]', team: 'alpine' },
      { id: 'esteban', image: 'drivers/esteban.webp', color: 'bg-[#B6BABD]', team: 'haas' },
      { id: 'oliver', image: 'drivers/oliver.webp', color: 'bg-[#B6BABD]', team: 'haas' },
      { id: 'liam', image: 'drivers/liam.webp', color: 'bg-[#6692FF]', team: 'vcarb' },
      { id: 'arvid', image: 'drivers/arvid.webp', color: 'bg-[#6692FF]', team: 'vcarb' },
      { id: 'nico', image: 'drivers/nico.webp', color: 'bg-[#800000]', team: 'sauber' }, 
      { id: 'gabriel', image: 'drivers/gabriel.webp', color: 'bg-[#800000]', team: 'sauber' }, 
      { id: 'sergio', image: 'drivers/sergio.webp', color: 'bg-[#333333]', team: 'cadillac' },
      { id: 'valtteri', image: 'drivers/valtteri.webp', color: 'bg-[#333333]', team: 'cadillac' }
    ];

    const Icon = ({ path, size = 18, className = "", fill = "none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d={path} />
      </svg>
    );

    const Paths = {
      Upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
      Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
      Expand: "M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7",
      Eraser: "M20 20H7L3 16C2 15 2 13 3 12L13 2C14 1 16 1 17 2L21 6C22 7 22 9 21 10L12 19",
      Edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z",
      Verify: "M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z",
      Close: "M18 6L6 18M6 6l12 12",
      Plus: "M12 5v14M5 12h14",
      Minus: "M5 12h14",
      Check: "M5 13l4 4L19 7",
      ChevronUp: "M18 15l-6-6-6 6",
      ChevronDown: "M6 9l6 6 6-6"
    };

    const createProcessedImage = async (img) => {
      const temp = document.createElement('canvas');
      temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const imageData = tCtx.getImageData(0, 0, temp.width, temp.height);
      const data = imageData.data;
      const samples = [];
      const skip = Math.max(1, Math.floor(temp.width / 30));
      for (let x = 0; x < temp.width; x += skip) { 
        const i1 = (0 * temp.width + x) * 4;
        samples.push({ r: data[i1], g: data[i1+1], b: data[i1+2] });
        const i2 = ((temp.height - 1) * temp.width + x) * 4;
        samples.push({ r: data[i2], g: data[i2+1], b: data[i2+2] });
      }
      const counts = {};
      samples.forEach(c => { const k = `${Math.floor(c.r/8)},${Math.floor(c.g/8)},${Math.floor(c.b/8)}`; counts[k] = (counts[k]||0)+1; });
      const topColorKey = Object.keys(counts).length > 0 ? Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b) : "255,255,255";
      const [bgR, bgG, bgB] = topColorKey.split(',').map(v => v * 8);
      for (let i = 0; i < data.length; i += 4) {
        const d = (Math.abs(data[i]-bgR) + Math.abs(data[i+1]-bgG) + Math.abs(data[i+2]-bgB)) / 3;
        if (d < 35) data[i+3] = 0; else if (d < 55) data[i+3] = ((d-35)/20)*255;
      }
      tCtx.putImageData(imageData, 0, 0);
      return new Promise(r => { const o = new Image(); o.onload = () => r(o); o.src = temp.toDataURL(); });
    };

    const detectContentBounds = (img) => {
      const temp = document.createElement('canvas');
      temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const pixels = tCtx.getImageData(0, 0, img.width, img.height).data;
      let minX = img.width, minY = img.height, maxX = 0, maxY = 0, found = false;
      for (let y = 0; y < img.height; y += 10) {
        for (let x = 0; x < img.width; x += 10) {
          if (pixels[(y * img.width + x) * 4 + 3] > 15) {
            minX = Math.min(minX, x); maxX = Math.max(maxX, x);
            minY = Math.min(minY, y); maxY = Math.max(maxY, y);
            found = true;
          }
        }
      }
      return found ? { x: minX, y: minY, w: maxX - minX, h: maxY - minY } : { x: 0, y: 0, w: img.width, h: img.height };
    };

    function ArtworkStudio({ rawImage, initialTransform, initialPaper, isBgRemoved, onConfirm, onCancel }) {
      const canvasRef = useRef(null);
      const [images, setImages] = useState({ original: null, processed: null });
      const [transform, setTransform] = useState(initialTransform);
      const [paper, setPaper] = useState(initialPaper);
      const isDragging = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });
      const startDist = useRef(0);
      const startScale = useRef(1);
      const baseScale = useRef(initialTransform.scale);

      useEffect(() => {
        const img = new Image();
        img.onload = async () => {
          const proc = await createProcessedImage(img);
          setImages({ original: img, processed: proc });
        };
        img.src = rawImage;
      }, [rawImage]);

      const render = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !images.original) return;
        const ctx = canvas.getContext('2d');
        const target = paper === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
        canvas.width = target.w; canvas.height = target.h;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(transform.x, transform.y);
        ctx.scale(transform.scale, transform.scale);
        const active = isBgRemoved ? images.processed : images.original;
        ctx.drawImage(active, -active.width/2, -active.height/2);
        ctx.restore();
      }, [images, transform, isBgRemoved, paper]);

      useEffect(() => { render(); }, [render]);

      const handleTouchStart = (e) => {
        if (e.touches.length === 2) {
          e.preventDefault();
          startDist.current = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          startScale.current = transform.scale;
        } else {
          isDragging.current = true;
          lastPos.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        }
      };

      const handleTouchMove = (e) => {
        if (!canvasRef.current) return;
        const rect = canvasRef.current.getBoundingClientRect();
        const ratio = canvasRef.current.width / rect.width;
        if (e.touches.length === 2) {
          e.preventDefault();
          const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          setTransform(p => ({ ...p, scale: startScale.current * (dist / startDist.current) }));
        } else if (isDragging.current) {
          const dx = (e.touches[0].pageX - lastPos.current.x) * ratio;
          const dy = (e.touches[0].pageY - lastPos.current.y) * ratio;
          setTransform(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
          lastPos.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        }
      };

      const displayZoom = Math.round((transform.scale / baseScale.current) * 100);

      return (
        <div className="fixed inset-0 z-[100] bg-slate-100 flex flex-col md:flex-row animate-in fade-in duration-300">
          <div className="flex-1 bg-[#e2e8f0] relative flex items-center justify-center overflow-hidden">
            <div className="flex flex-col items-center justify-center w-full h-full p-8">
              <div className="relative">
                <canvas 
                  ref={canvasRef} 
                  className="max-w-full max-h-[80vh] bg-white studio-canvas-bg shadow-xl"
                  onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={() => isDragging.current = false}
                />
                <div className="absolute -top-10 left-0 flex bg-white border border-slate-200 p-0.5 rounded-full overflow-hidden shadow-sm">
                   {['A4', 'A3'].map(size => (
                     <button key={size} onClick={() => setPaper(size)} className={`px-4 py-1 text-[8px] font-black uppercase rounded-full transition-colors ${paper === size ? 'bg-black text-white' : 'text-slate-400 hover:text-black'}`}>{size}</button>
                   ))}
                </div>
              </div>
            </div>
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-black/85 backdrop-blur-md p-2 rounded-2xl z-30">
               <button onClick={() => setTransform(p => ({...p, scale: p.scale*0.99}))} className="w-10 h-10 flex items-center justify-center bg-white/10 text-white rounded-xl active:scale-90"><Icon path={Paths.Minus}/></button>
               <div className="flex flex-col items-center">
                  <span className="text-white text-[7px] font-black uppercase opacity-50 text-center">Scale %</span>
                  <input type="number" value={displayZoom} onChange={e => setTransform(p => ({...p, scale: (e.target.value/100)*baseScale.current}))} className="w-16 bg-transparent text-white text-center font-black text-xs focus:outline-none" />
               </div>
               <button onClick={() => setTransform(p => ({...p, scale: p.scale*1.01}))} className="w-10 h-10 flex items-center justify-center bg-white/10 text-white rounded-xl active:scale-90"><Icon path={Paths.Plus}/></button>
            </div>
          </div>
          <div className="w-full md:w-[380px] bg-white p-6 md:p-8 flex flex-col justify-between border-l border-slate-200 z-40 relative">
            <div className="space-y-6">
              <div className="flex justify-between items-center">
                <div className="flex items-center gap-0.5">
                   <div className="text-blue-500 flex items-center"><Icon path={Paths.Verify} size={22} className="fill-blue-500 stroke-white stroke-[1.5px]"/></div>
                   <h2 className="font-roboto-bold text-xl tracking-tighter leading-none">Jestudios</h2>
                </div>
                <button onClick={onCancel} className="p-2 bg-slate-50 rounded-full hover:bg-slate-100 transition-colors"><Icon path={Paths.Close} /></button>
              </div>
              <div className="space-y-4">
                 <div className="grid grid-cols-2 gap-3">
                    <div className="flex gap-1.5">
                       <button onClick={() => setTransform(p => ({...p, x: p.x - 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M15 18l-6-6 6-6"/></button>
                       <button onClick={() => setTransform(p => ({...p, x: p.x + 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M9 18l6-6-6-6"/></button>
                    </div>
                    <div className="flex gap-1.5">
                       <button onClick={() => setTransform(p => ({...p, y: p.y - 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M18 15l-6-6-6 6"/></button>
                       <button onClick={() => setTransform(p => ({...p, y: p.y + 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M18 9l-6 6-6-6"/></button>
                    </div>
                 </div>
              </div>
            </div>
            <button onClick={() => onConfirm(transform, paper)} className="w-full py-5 bg-black text-white rounded-xl font-black uppercase tracking-[0.1em] text-xs mt-8 active:scale-95 transition-all">Apply</button>
          </div>
        </div>
      );
    }

    function App() {
      const [garmentColor, setGarmentColor] = useState('black');
      const [selectedDriver, setSelectedDriver] = useState(null);
      const [uploadedImage, setUploadedImage] = useState(null); 
      const [rawImage, setRawImage] = useState(null); 
      const [processedImage, setProcessedImage] = useState(null); 
      const [isStudioOpen, setIsStudioOpen] = useState(false);
      const [isBgRemoved, setIsBgRemoved] = useState(true);
      const [isAutoFit, setIsAutoFit] = useState(true);
      const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
      const [paperSize, setPaperSize] = useState("A4");
      const [editorScale, setEditorScale] = useState(1);
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [gridZoom, setGridZoom] = useState(1);
      const [isPanning, setIsPanning] = useState(false);
      const [isDriversExpanded, setIsDriversExpanded] = useState(false);
      const [isDragOver, setIsDragOver] = useState(false);

      const dragCounter = useRef(0);
      const panRef = useRef({ isPanning: false, startX: 0, startY: 0 });
      const containerRef = useRef(null);
      const fileInputRef = useRef(null);

      const VIEWS = ['front', 'back', 'detail'];

      useEffect(() => {
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err));
          });
        }
      }, []);

      const handlePanStart = (e) => {
        if (e.shiftKey || e.button === 1) {
          e.preventDefault();
          panRef.current.isPanning = true;
          panRef.current.startX = e.clientX - pan.x;
          panRef.current.startY = e.clientY - pan.y;
          setIsPanning(true);
        }
      };

      const handlePanMove = (e) => {
        if (!panRef.current.isPanning) return;
        setPan({ x: e.clientX - panRef.current.startX, y: e.clientY - panRef.current.startY });
      };

      const handlePanEnd = () => {
        panRef.current.isPanning = false;
        setIsPanning(false);
      };

      const handleWheel = (e) => {
        setGridZoom(prev => {
          const newZoom = prev - e.deltaY * 0.0015;
          return Math.min(Math.max(0.3, newZoom), 3);
        });
      };

      useEffect(() => {
        const updateScale = () => {
          if (containerRef.current) {
            const firstCanvas = containerRef.current.querySelector('.canvas-wrapper');
            if (firstCanvas) {
               const rect = firstCanvas.getBoundingClientRect();
               setEditorScale(rect.width / CANVAS_SIZE);
            }
          }
        };
        updateScale();
        const obs = new ResizeObserver(updateScale);
        if (containerRef.current) obs.observe(containerRef.current);
        return () => obs.disconnect();
      }, [isStudioOpen, selectedDriver]);

      useEffect(() => {
        if (!rawImage) return;
        const gen = async () => {
          const imgObj = new Image();
          imgObj.onload = () => {
            const activeImg = isBgRemoved ? processedImage : imgObj;
            if (!activeImg) return;
            const target = paperSize === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
            const tmp = document.createElement('canvas'); 
            tmp.width = target.w; tmp.height = target.h;
            const c = tmp.getContext('2d');
            c.save();
            c.translate(transform.x, transform.y);
            c.scale(transform.scale, transform.scale);
            c.drawImage(activeImg, -activeImg.width/2, -activeImg.height/2);
            c.restore();
            setUploadedImage(tmp.toDataURL());
          };
          imgObj.src = rawImage;
        };
        gen();
      }, [rawImage, processedImage, transform, isBgRemoved, paperSize]);

      const processFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const img = new Image();
          img.onload = async () => {
            setRawImage(ev.target.result);
            const proc = await createProcessedImage(img);
            setProcessedImage(proc);
            const bounds = detectContentBounds(proc);
            const target = (bounds.w > bounds.h) ? { w: A4.h, h: A4.w, name: "A4" } : { w: A3.w, h: A3.h, name: "A3" };
            setPaperSize(target.name);
            setTransform({ x: target.w / 2, y: target.h / 2, scale: Math.max(target.w / bounds.w, target.h / bounds.h) });
            setIsAutoFit(true);
            setIsBgRemoved(true);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleUpload = (e) => processFile(e.target.files[0]);

      const handleDragEnter = (e) => {
        e.preventDefault();
        dragCounter.current += 1;
        if (e.dataTransfer.items && e.dataTransfer.items.length > 0) {
          setIsDragOver(true);
        }
      };

      const handleDragLeave = (e) => {
        e.preventDefault();
        dragCounter.current -= 1;
        if (dragCounter.current === 0) {
          setIsDragOver(false);
        }
      };

      const handleDragOver = (e) => e.preventDefault();

      const handleDrop = (e) => {
        e.preventDefault();
        dragCounter.current = 0;
        setIsDragOver(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          processFile(e.dataTransfer.files[0]);
        }
      };

      const toggleAutoFit = () => {
        if (!processedImage) return;
        const nextState = !isAutoFit;
        setIsAutoFit(nextState);
        const target = paperSize === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
        if (nextState) {
          const bounds = detectContentBounds(processedImage);
          setTransform({ x: target.w / 2, y: target.h / 2, scale: Math.max(target.w / bounds.w, target.h / bounds.h) });
        } else {
          setTransform({ x: target.w / 2, y: target.h / 2, scale: 1 });
        }
      };

      const downloadMockup = async (viewsToDownload = VIEWS) => {
        for (const type of viewsToDownload) {
          if ((type === 'back' || type === 'cta') && !selectedDriver) continue;
          const canvas = document.createElement('canvas');
          canvas.width = CANVAS_SIZE; canvas.height = CANVAS_SIZE;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, canvas.width, canvas.height);
          let src = `garment/garment-${garmentColor}.png`;
          let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
          if (type === 'back' && selectedDriver) { src = `garment/garment-${garmentColor}-${selectedDriver}.png`; pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 }; }
          else if (type === 'detail') { src = `garment/garment-${garmentColor}-detail.png`; pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; }
          
          const gImg = new Image();
          await new Promise(r => { gImg.onload = r; gImg.onerror = r; gImg.src = src; });
          if (gImg.naturalWidth) ctx.drawImage(gImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
          if (type === 'front' && selectedDriver) {
             const dImg = new Image();
             await new Promise(r => { dImg.onload = r; dImg.onerror = r; dImg.src = DRIVERS.find(d=>d.id===selectedDriver).image; });
             if (dImg.naturalWidth) {
                 const dw = 650; const dh = (dImg.naturalHeight/dImg.naturalWidth)*dw;
                 ctx.drawImage(dImg, -85, CANVAS_SIZE - dh - (CANVAS_SIZE * -1.30), dw, dh);
             }
          }
          if (uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail')) {
            const aImg = new Image();
            await new Promise(r => { aImg.onload = r; aImg.src = uploadedImage; });
            ctx.globalAlpha = 0.9;
            ctx.globalCompositeOperation = garmentColor === 'white' ? 'multiply' : 'screen';
            ctx.drawImage(aImg, pos.l, pos.t, pos.w, (aImg.naturalHeight/aImg.naturalWidth)*pos.w);
            ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0;
          }
          const link = document.createElement('a');
          link.download = `Jestudios_${type}_${Date.now()}.png`;
          link.href = canvas.toDataURL('image/png'); link.click();
          await new Promise(r => setTimeout(r, 400));
        }
      };

      const renderView = (type, index) => {
        let src = `garment/garment-${garmentColor}.png`;
        let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
        if (type === 'back') {
            if (!selectedDriver) return <div key={type} className="canvas-wrapper relative bg-white w-full aspect-square flex flex-col items-center justify-center rounded-xl border border-slate-200"><span className="text-slate-400 font-medium text-xs text-center px-4">Select driver to view back</span></div>;
            src = `garment/garment-${garmentColor}-${selectedDriver}.png`;
            pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 };
        } 
        else if (type === 'detail') { src = `garment/garment-${garmentColor}-detail.png`; pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; }
        
        const showArt = uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail');
        return (
          <div key={type} className="canvas-wrapper relative bg-white w-full aspect-square overflow-hidden rounded-xl border border-slate-200">
            <div style={{ width: CANVAS_SIZE, height: CANVAS_SIZE, transform: `scale(${editorScale})`, transformOrigin: 'top left', position: 'absolute', top: 0, left: 0 }}>
              <img src={src} className="w-full h-full absolute inset-0 object-cover pointer-events-none" />
              {type === 'front' && selectedDriver && <img src={DRIVERS.find(d=>d.id===selectedDriver).image} className="absolute pointer-events-none" style={{ width: 650, left: -85, bottom: '-130%', zIndex: 5 }} />}
              {showArt && <div className="absolute" style={{ left: pos.l, top: pos.t, width: pos.w, zIndex: 10 }}>
                <canvas ref={el => { if (el && uploadedImage) {
                   const c = el.getContext('2d'); const i = new Image();
                   i.onload = () => { el.width = pos.w; el.height = (i.naturalHeight/i.naturalWidth)*pos.w; c.globalAlpha = 0.9; c.globalCompositeOperation = garmentColor === 'white' ? 'multiply' : 'screen'; c.drawImage(i, 0, 0, el.width, el.height); };
                   i.src = uploadedImage;
                }}} className="w-full pointer-events-none" />
              </div>}
            </div>
          </div>
        );
      };

      return (
        <div 
          className="h-screen w-full flex flex-col bg-slate-50 overflow-hidden relative"
          onDragEnter={handleDragEnter}
          onDragOver={handleDragOver}
          onDragLeave={handleDragLeave}
          onDrop={handleDrop}
        >
          {isDragOver && (
            <div className="absolute inset-0 z-[9999] bg-blue-500/10 backdrop-blur-[2px] m-3 border-4 border-dashed border-blue-500 rounded-3xl flex items-center justify-center pointer-events-none transition-all">
              <div className="bg-white px-8 py-6 rounded-3xl shadow-2xl flex flex-col items-center gap-4 animate-in zoom-in-95 duration-200">
                <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center">
                  <Icon path={Paths.Upload} size={28} className="text-blue-500" />
                </div>
                <div className="text-center">
                  <h3 className="font-roboto-bold text-xl text-slate-800">Drop Artwork Here</h3>
                  <p className="text-slate-500 text-sm mt-1">Release to upload your design</p>
                </div>
              </div>
            </div>
          )}

          <PWAInstallPrompt />
          {isStudioOpen && <ArtworkStudio rawImage={rawImage} initialTransform={transform} initialPaper={paperSize} isBgRemoved={isBgRemoved} onConfirm={(t, p) => { setTransform(t); setPaperSize(p); setIsStudioOpen(false); }} onCancel={() => setIsStudioOpen(false)} />}

          <div 
            className={`flex-1 w-full relative overflow-hidden flex items-center justify-center outline-none ${isPanning ? 'cursor-grabbing' : 'cursor-grab'}`}
            onMouseDown={handlePanStart} onMouseMove={handlePanMove} onMouseUp={handlePanEnd} onMouseLeave={handlePanEnd} onWheel={handleWheel}
          >
            <div className="w-[90%] max-w-screen-xl origin-center" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${gridZoom})`, transition: isPanning ? 'none' : 'transform 0.1s ease-out', willChange: 'transform' }}>
              <div ref={containerRef} className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-5 w-full">
                {VIEWS.map((v, i) => renderView(v, i))}
              </div>
            </div>
          </div>

          <div className="w-full bg-white border-t border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-40 shrink-0">
            
            {/* MOBILE LAYOUT (Stacked into 3 rows) - Visible only on screens < XL */}
            <div className="xl:hidden flex flex-col gap-3 p-3 w-full max-w-screen-2xl mx-auto">
              
              {/* Row 1: Choose color | driver selector (scrollable) */}
              <div className="flex items-center gap-3 w-full">
                <div className="flex gap-2 shrink-0 border-r pr-3 border-slate-100">
                  {['black', 'white'].map(c => (
                    <button key={c} onClick={() => setGarmentColor(c)} className={`w-8 h-8 rounded-full border-2 transition-transform ${c === 'black' ? 'bg-black' : 'bg-[#f8fafc]'} ${garmentColor === c ? 'border-black scale-110' : 'border-slate-100'}`} />
                  ))}
                </div>
                <div className="flex-1 overflow-x-auto hide-scrollbar flex gap-2.5 py-1">
                   {DRIVERS.map(d => (
                      <button key={d.id} onClick={() => setSelectedDriver(d.id)} className={`relative w-9 h-9 rounded-full shrink-0 transition-all overflow-hidden border ${selectedDriver === d.id ? 'border-black scale-110 shadow-lg z-10' : 'opacity-70 border-slate-200 hover:opacity-100'}`}>
                        <div className={`absolute inset-0 ${d.color}`} />
                        <img src={d.image} className="absolute top-[10%] w-[40px] left-1/2 -translate-x-1/2" />
                      </button>
                    ))}
                </div>
              </div>

              {/* Row 2: Upload art | remove bg icon | Fit icon | Edit Icon */}
              <div className="flex items-center gap-2 w-full">
                <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleUpload} />
                <div className="flex-1 flex items-center min-w-0">
                  {!rawImage ? (
                    <button onClick={() => fileInputRef.current.click()} className="flex-1 h-10 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 flex items-center justify-center gap-2 px-3">
                      <Icon path={Paths.Upload} size={14} className="text-slate-400" />
                      <span className="text-[10px] font-black uppercase tracking-wider text-slate-500 truncate">Upload Art</span>
                    </button>
                  ) : (
                    <button onClick={() => fileInputRef.current.click()} className="flex-1 h-10 border border-slate-200 rounded-xl bg-white hover:bg-slate-50 flex items-center gap-2 px-2 overflow-hidden">
                      <div className="w-6 h-6 rounded border border-slate-100 overflow-hidden shrink-0"><img src={uploadedImage} className="w-full h-full object-contain" /></div>
                      <span className="text-[10px] font-black uppercase tracking-wide text-slate-800 truncate">Replace</span>
                    </button>
                  )}
                </div>
                <div className="flex h-10 rounded-xl overflow-hidden border border-slate-200 bg-white shrink-0">
                  <button onClick={() => setIsBgRemoved(!isBgRemoved)} className={`w-10 border-r border-slate-100 flex items-center justify-center transition-colors ${isBgRemoved ? 'bg-slate-100 text-black' : 'bg-white text-slate-400 hover:text-black'}`} title="Remove BG"><Icon path={Paths.Eraser} size={14} /></button>
                  <button onClick={toggleAutoFit} className={`w-10 border-r border-slate-100 flex items-center justify-center transition-colors ${isAutoFit ? 'bg-slate-100 text-black' : 'bg-white text-slate-400 hover:text-black'}`} title="Fit"><Icon path={Paths.Expand} size={14} /></button>
                  <button onClick={() => setIsStudioOpen(true)} className="w-10 bg-white flex items-center justify-center hover:bg-slate-50 text-slate-400 hover:text-black"><Icon path={Paths.Edit} size={14} /></button>
                </div>
              </div>

              {/* Row 3: Download buttons */}
              <div className="flex gap-2 w-full">
                <button onClick={() => downloadMockup(VIEWS)} className="flex-1 h-10 bg-black text-white rounded-xl text-[9px] font-black uppercase tracking-[0.1em] active:scale-95 flex items-center justify-center gap-1.5 px-2"><Icon path={Paths.Download} size={12} /><span className="truncate">Download</span></button>
              </div>
            </div>

            {/* DESKTOP LAYOUT (Original Horizontal View) - Visible only on screens XL and larger */}
            <div className="hidden xl:flex items-end gap-4 p-4 w-full max-w-screen-2xl mx-auto">
              
              {/* Art Tools & Actions Left Container */}
              <div className="flex items-center gap-3 shrink-0">
                <div className="flex shrink-0">
                  <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleUpload} />
                  {!rawImage ? (
                    <button onClick={() => fileInputRef.current.click()} className="h-12 px-4 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 flex items-center justify-center gap-2 group transition-colors">
                      <Icon path={Paths.Upload} size={16} className="text-slate-400 group-hover:text-blue-500 transition-colors" />
                      <span className="text-[11px] font-black uppercase tracking-wider text-slate-500 group-hover:text-black transition-colors whitespace-nowrap">Upload Art</span>
                    </button>
                  ) : (
                    <div className="flex h-12 rounded-xl overflow-hidden border border-slate-200 bg-white">
                      <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-3 bg-white px-3 border-r border-slate-100 hover:bg-slate-50 transition-colors">
                        <div className="w-6 h-6 rounded border border-slate-100 overflow-hidden bg-white shrink-0"><img src={uploadedImage} className="w-full h-full object-contain" /></div>
                        <span className="text-[10px] font-black uppercase tracking-wide text-slate-800 whitespace-nowrap">Replace</span>
                      </button>
                      <button onClick={toggleAutoFit} className={`w-12 border-r border-slate-100 flex items-center justify-center transition-colors ${isAutoFit ? 'bg-slate-100 text-black' : 'bg-white text-slate-400 hover:text-black'}`} title="Auto Fit"><Icon path={Paths.Expand} size={14} /></button>
                      <button onClick={() => setIsBgRemoved(!isBgRemoved)} className={`w-12 border-r border-slate-100 flex items-center justify-center transition-colors ${isBgRemoved ? 'bg-slate-100 text-black' : 'bg-white text-slate-400 hover:text-black'}`} title="Remove Background"><Icon path={Paths.Eraser} size={14} /></button>
                      <button onClick={() => setIsStudioOpen(true)} className="w-12 bg-white flex items-center justify-center hover:bg-slate-50 text-slate-400 hover:text-black transition-colors"><Icon path={Paths.Edit} size={14} /></button>
                    </div>
                  )}
                </div>

                <div className="flex gap-2 shrink-0">
                  <button onClick={() => downloadMockup(VIEWS)} className="h-12 px-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-[0.1em] active:scale-95 transition-transform flex items-center gap-1.5 whitespace-nowrap"><Icon path={Paths.Download} size={14} /> Download</button>
                </div>

                <div className="w-px h-8 bg-slate-200 shrink-0 mx-1" />

                <div className="flex gap-2 shrink-0">
                  {['black', 'white'].map(c => (
                    <button key={c} onClick={() => setGarmentColor(c)} className={`w-12 h-12 rounded-full border-[3px] transition-transform ${c === 'black' ? 'bg-black' : 'bg-[#f8fafc]'} ${garmentColor === c ? 'border-black scale-110' : 'border-slate-100 hover:scale-105'}`} />
                  ))}
                </div>
              </div>

              <div className="w-px h-8 bg-slate-200 shrink-0 mx-1" />

              {/* Driver Selector Right Container */}
              <div className="flex-1 relative min-w-[200px] h-[48px] z-50">
                <div className={`absolute bottom-[-8px] left-[-8px] right-[-8px] bg-white transition-all duration-300 flex flex-col justify-end ${isDriversExpanded ? 'shadow-[0_-20px_40px_rgba(0,0,0,0.15)] border border-slate-200 rounded-xl p-2' : 'shadow-none border-transparent p-2'}`}>
                  <button onClick={() => setIsDriversExpanded(!isDriversExpanded)} className={`absolute left-1/2 -translate-x-1/2 flex items-center justify-center w-14 h-6 cursor-pointer z-20 transition-colors ${isDriversExpanded ? '-top-6 bg-white border border-slate-200 border-b-0 rounded-t-xl' : '-top-5 bg-slate-100 hover:bg-slate-200 border border-slate-200 border-b-0 rounded-t-lg'}`}>
                    <Icon path={isDriversExpanded ? Paths.ChevronDown : Paths.ChevronUp} size={16} className="text-slate-500" />
                  </button>
                  <div className={`flex flex-wrap content-start gap-2.5 transition-all duration-300 w-full ${isDriversExpanded ? 'max-h-[500px]' : 'max-h-[48px] overflow-hidden'}`}>
                    {DRIVERS.map(d => (
                      <button key={d.id} onClick={() => setSelectedDriver(d.id)} className={`relative w-12 h-12 rounded-full shrink-0 transition-transform overflow-hidden outline-offset-2 ${selectedDriver === d.id ? 'outline outline-2 outline-black opacity-100 scale-110 z-10' : 'opacity-80 border border-slate-200 hover:opacity-100 hover:scale-105'}`}>
                        <div className={`absolute inset-0 ${d.color}`} /><img src={d.image} className="absolute top-[10%] w-[60px] left-1/2 -translate-x-1/2" />
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
