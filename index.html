    const createProcessedImage = async (img) => {
      const temp = document.createElement('canvas'); temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d'); tCtx.drawImage(img, 0, 0);
      const imageData = tCtx.getImageData(0, 0, temp.width, temp.height); const data = imageData.data;
      const samples = []; const skip = Math.max(1, Math.floor(temp.width / 30));
      for (let x = 0; x < temp.width; x += skip) { samples.push({ r: data[(0 * temp.width + x) * 4], g: data[(0 * temp.width + x) * 4 + 1], b: data[(0 * temp.width + x) * 4 + 2] }); samples.push({ r: data[((temp.height-1) * temp.width + x) * 4], g: data[((temp.height-1) * temp.width + x) * 4 + 1], b: data[((temp.height-1) * temp.width + x) * 4 + 2] }); }
      const counts = {}; samples.forEach(c => { const k = `${Math.floor(c.r/8)},${Math.floor(c.g/8)},${Math.floor(c.b/8)}`; counts[k] = (counts[k]||0)+1; });
      const topColorKey = Object.keys(counts).length > 0 ? Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b) : "255,255,255";
      const [bgR, bgG, bgB] = topColorKey.split(',').map(v => v * 8);
      
      const w = temp.width;
      const h = temp.height;
      const rawAlpha = new Uint8Array(w * h);

      for (let i = 0; i < data.length; i += 4) { 
        const d = (Math.abs(data[i]-bgR) + Math.abs(data[i+1]-bgG) + Math.abs(data[i+2]-bgB)) / 3; 
        rawAlpha[i/4] = d < 35 ? 0 : (d < 55 ? ((d - 35) / 20) * 255 : 255);
      }

      const blurAlpha = (input, width, height, radius) => {
        const out1 = new Uint8Array(width * height);
        const out2 = new Uint8Array(width * height);
        
        for (let y = 0; y < height; y++) {
          let sum = 0, count = 0;
          for (let i = -radius; i <= radius; i++) {
            if (i >= 0 && i < width) { sum += input[y * width + i]; count++; }
          }
          out1[y * width] = sum / count;
          for (let x = 1; x < width; x++) {
            if (x + radius < width) { sum += input[y * width + x + radius]; count++; }
            if (x - radius - 1 >= 0) { sum -= input[y * width + x - radius - 1]; count--; }
            out1[y * width + x] = sum / count;
          }
        }
        
        for (let x = 0; x < width; x++) {
          let sum = 0, count = 0;
          for (let i = -radius; i <= radius; i++) {
            if (i >= 0 && i < height) { sum += out1[i * width + x]; count++; }
          }
          out2[x] = sum / count;
          for (let y = 1; y < height; y++) {
            if (y + radius < height) { sum += out1[(y + radius) * width + x]; count++; }
            if (y - radius - 1 >= 0) { sum -= out1[(y - radius - 1) * width + x]; count--; }
            out2[y * width + x] = sum / count;
          }
        }
        return out2;
      };

      const radius = Math.max(3, Math.floor(w / 250)); 
      let smoothedAlpha = blurAlpha(rawAlpha, w, h, radius);
      smoothedAlpha = blurAlpha(smoothedAlpha, w, h, radius); 

      for (let i = 0; i < smoothedAlpha.length; i++) {
        let a = smoothedAlpha[i];
        if (a < 115) data[i*4+3] = 0;

    const detectContentBounds = (img) => {
      const temp = document.createElement('canvas'); temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d'); tCtx.drawImage(img, 0, 0);

      let minX = img.width, minY = img.height, maxX = 0, maxY = 0, found = false;
      for (let y = 0; y < img.height; y += 4) {

    function ArtworkStudio({ rawImage, initialTransform, initialPaper, isBgRemoved, setIsBgRemoved, isInverted, setIsInverted, onConfirm, onCancel }) {

      useEffect(() => { currentStateRef.current = { transform, images }; }, [transform, images]);

      const saveHistoryState = useCallback((overrides = null) => {
          const current = overrides || currentStateRef.current;
          if (!current.images.original) return;
          const state = {
              transform: current.transform,
              images: current.images,
              eraserDataUrl: eraserMaskRef.current ? eraserMaskRef.current.toDataURL() : null
          };
          const nextIndex = historyIndex.current + 1;
          historyRef.current = historyRef.current.slice(0, nextIndex);
          historyRef.current.push(state);
          historyIndex.current = nextIndex;
          setCanUndo(historyIndex.current > 0);
          setCanRedo(historyIndex.current < historyRef.current.length - 1);
      }, []);

      const loadHistoryState = useCallback((index) => {
          if (index < 0 || index >= historyRef.current.length) return;
          const state = historyRef.current[index];
          setTransform(state.transform);
          setImages(state.images);
          
          if (eraserMaskRef.current && state.images && state.images.original) {
              // Vital fix: Resize the hidden mask canvas to match the image dimensions from history
              eraserMaskRef.current.width = state.images.original.width;
              eraserMaskRef.current.height = state.images.original.height;
              const mCtx = eraserMaskRef.current.getContext('2d');
              mCtx.clearRect(0, 0, eraserMaskRef.current.width, eraserMaskRef.current.height);
              
              if (state.eraserDataUrl) {
                  const img = new Image();
                  img.onload = () => {
                      mCtx.drawImage(img, 0, 0);
                      render();
                  };
                  img.src = state.eraserDataUrl;
              } else {
                  render();
              }
          }
          
          historyIndex.current = index;
          setCanUndo(index > 0);
          setCanRedo(index < historyRef.current.length - 1);
      }, [render]);

      const undo = useCallback(() => {
          if (historyIndex.current > 0) loadHistoryState(historyIndex.current - 1);
      }, [loadHistoryState]);

      const redo = useCallback(() => {
          if (historyIndex.current < historyRef.current.length - 1) loadHistoryState(historyIndex.current + 1);
      }, [loadHistoryState]);

      const checkCropHit = (localX, localY, box) => {
        if (!box) return 'draw';
        const handleSize = Math.max(18, 54 / transform.scale); // Generous padding for easier grabbing
        const { x: bx, y: by, w, h } = box;
        const hit = (hx, hy) => Math.abs(localX - (bx + hx)) < handleSize && Math.abs(localY - (by + hy)) < handleSize;

        if (hit(0, 0)) return 'tl';
        if (hit(w, 0)) return 'tr';
        if (hit(0, h)) return 'bl';
        if (hit(w, h)) return 'br';
        if (hit(w/2, 0)) return 'tc';
        if (hit(w/2, h)) return 'bc';
        if (hit(0, h/2)) return 'ml';
        if (hit(w, h/2)) return 'mr';
        if (localX > bx && localX < bx + w && localY > by && localY < by + h) return 'move';
        return 'draw';
      };

      const getCursorFromAction = (action) => {
         if (action === 'tl' || action === 'br') return 'nwse-resize';
         if (action === 'tr' || action === 'bl') return 'nesw-resize';
         if (action === 'tc' || action === 'bc') return 'ns-resize';
         if (action === 'ml' || action === 'mr') return 'ew-resize';
         if (action === 'move') return 'move';
         return 'default';
      };

      useEffect(() => {
          const handleKeyDown = (e) => {
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                  if (e.shiftKey) { e.preventDefault(); redo(); }
                  else { e.preventDefault(); undo(); }
              }
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                  e.preventDefault(); redo();
              }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
      }, [undo, redo]);

      useEffect(() => {
        const img = new Image();
        img.onload = async () => {
          const proc = await createProcessedImage(img);
          setImages({ original: img, processed: proc });
          const mask = document.createElement('canvas');
          mask.width = img.width; mask.height = img.height;
          eraserMaskRef.current = mask;
          contentBoundsRef.current = detectContentBounds(proc);
          
          setTimeout(() => {
             historyRef.current = [];
             historyIndex.current = -1;
             saveHistoryState({ transform: initialTransform, images: { original: img, processed: proc } });
          }, 50);
        };
        img.src = rawImage;
      }, [rawImage, initialTransform, saveHistoryState]);

      const applyCrop = async () => {
        if (!cropBox || cropBox.w === 0 || cropBox.h === 0) { setIsCropMode(false); return; }
        
        const active = isBgRemoved ? images.processed : images.original;
        
        // Convert to strictly positive top-left origin coordinates
        const x = Math.max(0, Math.round(cropBox.x));
        const y = Math.max(0, Math.round(cropBox.y));
        let w = Math.round(cropBox.w);
        let h = Math.round(cropBox.h);
        
        if (x + w > active.width) w = active.width - x;
        if (y + h > active.height) h = active.height - y;
        
        if (w < 10 || h < 10) { 
          setIsCropMode(false); setCropBox(null); return; 
        }
        
        const cropToImage = async (srcCanvas) => {
          return new Promise(res => {
              const img = new Image(); img.onload = () => res(img); img.src = srcCanvas.toDataURL();
          });
        };
        
        // Crop Original
        const origC = document.createElement('canvas'); origC.width = w; origC.height = h;
        origC.getContext('2d').drawImage(images.original, x, y, w, h, 0, 0, w, h);
        
        // Crop Processed (if it exists)
        let procC = null;
        if (images.processed) {
            procC = document.createElement('canvas'); procC.width = w; procC.height = h;
            procC.getContext('2d').drawImage(images.processed, x, y, w, h, 0, 0, w, h);
        }
        
        // Crop Eraser Mask
        const maskC = document.createElement('canvas'); maskC.width = w; maskC.height = h;
        maskC.getContext('2d').drawImage(eraserMaskRef.current, x, y, w, h, 0, 0, w, h);
        
        const newOrig = await cropToImage(origC);
        const newProc = procC ? await cropToImage(procC) : null;
        
        // Adjust coordinate system so the visual image doesn't jump on the screen
        const oldCenterX = images.original.width / 2;
        const oldCenterY = images.original.height / 2;
        const newCenterX = x + w / 2;
        const newCenterY = y + h / 2;
        
        const dx = (oldCenterX - newCenterX) * transform.scale;
        const dy = (oldCenterY - newCenterY) * transform.scale;
        
        const newTransform = { ...transform, x: transform.x - dx, y: transform.y - dy };
        const newImages = { original: newOrig, processed: newProc };
        
        setTransform(newTransform);
        setImages(newImages);
        eraserMaskRef.current = maskC;
        contentBoundsRef.current = detectContentBounds(newProc || newOrig);
        
        setIsCropMode(false);
        setCropBox(null);
        
        setTimeout(() => saveHistoryState({ transform: newTransform, images: newImages }), 50);
      };

      const render = useCallback(() => {
        const canvas = canvasRef.current; if (!canvas || !images.original) return;
        const ctx = canvas.getContext('2d'); 
        const target = paper === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
        canvas.width = target.w; canvas.height = target.h;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        ctx.save();
        ctx.translate(transform.x, transform.y); 
        ctx.scale(transform.scale, transform.scale);
        
        if (isInverted) ctx.filter = 'invert(1)';
        const active = isBgRemoved ? images.processed : images.original;
        
        ctx.drawImage(active, -active.width/2, -active.height/2);
        
        if (eraserMaskRef.current) {
          ctx.globalCompositeOperation = 'destination-out';
          ctx.drawImage(eraserMaskRef.current, -active.width/2, -active.height/2);
          ctx.globalCompositeOperation = 'source-over';
        }
        
        if (isInverted) ctx.filter = 'none';

        if (isCropMode) {
          if (cropBox) {
            // Handle inverted draws (negative widths)
            const rx = cropBox.w < 0 ? cropBox.x + cropBox.w : cropBox.x;
            const ry = cropBox.h < 0 ? cropBox.y + cropBox.h : cropBox.y;
            const rw = Math.abs(cropBox.w);
            const rh = Math.abs(cropBox.h);
            
            const cx = rx - active.width/2;
            const cy = ry - active.height/2;
            
            const imgX = -active.width/2;
            const imgY = -active.height/2;
            const imgW = active.width;
            const imgH = active.height;
            
            // Draw 4 masking rectangles around the crop area to keep the inside perfectly visible
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(imgX, imgY, imgW, cy - imgY); // Top
            ctx.fillRect(imgX, cy + rh, imgW, (imgY + imgH) - (cy + rh)); // Bottom
            ctx.fillRect(imgX, cy, cx - imgX, rh); // Left
            ctx.fillRect(cx + rw, cy, (imgX + imgW) - (cx + rw), rh); // Right
            
            if (rw > 0 && rh > 0) {
              // CorelDraw Style Outline
              ctx.lineWidth = 1.5 / transform.scale;
              ctx.strokeStyle = '#000000'; 
              ctx.strokeRect(cx, cy, rw, rh);
              
              // 8 Interactive Handles (More visible, thicker borders)
              ctx.fillStyle = '#ffffff';
              ctx.strokeStyle = '#000000';
              ctx.lineWidth = 3 / transform.scale;
              const s = 24 / transform.scale; // Significantly larger nodes
              
              const drawHandle = (hx, hy) => {
                 ctx.fillRect(hx - s/2, hy - s/2, s, s);
                 ctx.strokeRect(hx - s/2, hy - s/2, s, s);
              };
              
              drawHandle(cx, cy); // TL
              drawHandle(cx + rw/2, cy); // TC
              drawHandle(cx + rw, cy); // TR
              drawHandle(cx, cy + rh/2); // ML
              drawHandle(cx + rw, cy + rh/2); // MR
              drawHandle(cx, cy + rh); // BL
              drawHandle(cx + rw/2, cy + rh); // BC
              drawHandle(cx + rw, cy + rh); // BR
            }
          } else {
            // Fallback shading if no box is drawn yet
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(-active.width/2, -active.height/2, active.width, active.height);
          }
        }
        
        ctx.restore();

        const guides = snapGuidesRef.current;
        if (guides.x !== null || guides.y !== null) {
          ctx.lineWidth = Math.max(4, target.w / 350);
          ctx.strokeStyle = '#ef4444'; // Bright Red Smart Guides
          ctx.setLineDash([Math.max(15, target.w / 120), Math.max(15, target.w / 120)]);
          
          if (guides.x !== null) {
            ctx.beginPath(); ctx.moveTo(guides.x, 0); ctx.lineTo(guides.x, target.h); ctx.stroke();
          }
          if (guides.y !== null) {
            ctx.beginPath(); ctx.moveTo(0, guides.y); ctx.lineTo(target.w, guides.y); ctx.stroke();
          }
          ctx.setLineDash([]);
        }
      }, [images, transform, isBgRemoved, isInverted, paper, isCropMode, cropBox]);

      useEffect(() => { render(); }, [render]);

      const getCoord = (e) => {
        if (!e) return { x: 0, y: 0, localX: 0, localY: 0, ratio: 1 };
        const rect = canvasRef.current.getBoundingClientRect();
        
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        
        const ratio = canvasRef.current.width / rect.width;
        
        const canvasX = (clientX - rect.left) * ratio;
        const canvasY = (clientY - rect.top) * ratio;
        
        const localX = (canvasX - transform.x) / transform.scale + (images.original.width / 2);
        const localY = (canvasY - transform.y) / transform.scale + (images.original.height / 2);
        
        return { x: clientX, y: clientY, localX, localY, ratio };
      };

      const handleInteraction = (type, e) => {
        if (!canvasRef.current || !images.original) return;
        
        if (e.cancelable && type !== 'end') e.preventDefault();
        if (e.stopPropagation) e.stopPropagation();

        if (type === 'end') {
          let stateChanged = false;
          if (isDragging.current || isDrawing.current) stateChanged = true;
          
          isDragging.current = false;
          isDrawing.current = false;
          snapGuidesRef.current = { x: null, y: null };
          
          // Normalize the crop box so width and height are always positive
          if (isCropMode && cropBox) {
            setCropBox(p => ({
               x: p.w < 0 ? p.x + p.w : p.x,
               y: p.h < 0 ? p.y + p.h : p.y,
               w: Math.abs(p.w),
               h: Math.abs(p.h)
            }));
            cropAction.current = null;
          }
          
          if (stateChanged && !isCropMode) {
              setTimeout(() => saveHistoryState(), 0);
          }
          
          render(); 
          return;
        }

        const { x, y, localX, localY, ratio } = getCoord(e);

        if (type === 'start') {
          if (isCropMode) {
            isDragging.current = true;
            if (cropBox) {
              cropAction.current = checkCropHit(localX, localY, cropBox);
              if (cropAction.current === 'move') {
                cropStartPos.current = { x: localX - cropBox.x, y: localY - cropBox.y };
              } else if (cropAction.current === 'draw') {
                // Prevent dismissing or redrawing when clicking outside an active crop box
                cropAction.current = 'none'; 
              }
            } else {
              cropAction.current = 'draw';
              setCropBox({ x: localX, y: localY, w: 0, h: 0 });
            }
          } else if (isEraserActive) {
            isDrawing.current = true;
            const mCtx = eraserMaskRef.current.getContext('2d');
            mCtx.beginPath();
            mCtx.moveTo(localX, localY);
          } else {
            if (e.touches && e.touches.length === 2) {
              startDist.current = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
              startScale.current = transform.scale;
            } else {
              isDragging.current = true;
              lastPos.current = { x, y };
              rawTransformRef.current = { x: transform.x, y: transform.y, scale: transform.scale };
            }
          }
        } else if (type === 'move') {
          if (isCropMode && !isDragging.current) {
             const action = checkCropHit(localX, localY, cropBox);
             const newCursor = getCursorFromAction(action);
             if (cropHoverCursor !== newCursor) setCropHoverCursor(newCursor);
          } else if (isCropMode && isDragging.current) {
            if (cropAction.current === 'draw') {
              setCropBox(p => ({ ...p, w: localX - p.x, h: localY - p.y }));
            } else if (cropAction.current === 'move') {
              setCropBox(p => ({ ...p, x: localX - cropStartPos.current.x, y: localY - cropStartPos.current.y }));
            } else if (cropAction.current === 'tl') {
              setCropBox(p => ({ x: localX, y: localY, w: p.w + (p.x - localX), h: p.h + (p.y - localY) }));
            } else if (cropAction.current === 'tr') {
              setCropBox(p => ({ x: p.x, y: localY, w: localX - p.x, h: p.h + (p.y - localY) }));
            } else if (cropAction.current === 'bl') {
              setCropBox(p => ({ x: localX, y: p.y, w: p.w + (p.x - localX), h: localY - p.y }));
            } else if (cropAction.current === 'br') {
              setCropBox(p => ({ x: p.x, y: p.y, w: localX - p.x, h: localY - p.y }));
            } else if (cropAction.current === 'tc') {
              setCropBox(p => ({ x: p.x, y: localY, w: p.w, h: p.h + (p.y - localY) }));
            } else if (cropAction.current === 'bc') {
              setCropBox(p => ({ ...p, h: localY - p.y }));
            } else if (cropAction.current === 'ml') {
              setCropBox(p => ({ x: localX, y: p.y, w: p.w + (p.x - localX), h: p.h }));
            } else if (cropAction.current === 'mr') {
              setCropBox(p => ({ ...p, w: localX - p.x }));
            }
          } else if (isEraserActive && isDrawing.current) {
            const mCtx = eraserMaskRef.current.getContext('2d');
            mCtx.lineTo(localX, localY);
            mCtx.strokeStyle = 'black';
            // Sync the drawn width mathematically with the visual screen scale
            mCtx.lineWidth = (brushSize * ratio) / transform.scale;
            mCtx.lineCap = 'round';
            mCtx.stroke();
            render();
          } else if (isDragging.current) {
            if (e.touches && e.touches.length === 2) {
              const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
              setTransform(p => ({ ...p, scale: startScale.current * (dist / startDist.current) }));
            } else {
              const rect = canvasRef.current.getBoundingClientRect();
              const visualScale = Math.min(rect.width / canvasRef.current.width, rect.height / canvasRef.current.height);
              
              const dx = (x - lastPos.current.x) / visualScale;
              const dy = (y - lastPos.current.y) / visualScale;
              
              rawTransformRef.current.x += dx;
              rawTransformRef.current.y += dy;
              lastPos.current = { x, y };

              const target = paper === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
              const bounds = contentBoundsRef.current;
              let nx = rawTransformRef.current.x;
              let ny = rawTransformRef.current.y;
              let guides = { x: null, y: null };

              if (bounds) {
                const scale = transform.scale;
                const activeImg = isBgRemoved ? images.processed : images.original;
                const imgW = activeImg.width * scale;
                const imgH = activeImg.height * scale;

                const cLeft = bounds.x * scale;
                const cRight = (bounds.x + bounds.w) * scale;
                const cTop = bounds.y * scale;
                const cBottom = (bounds.y + bounds.h) * scale;

                // Projecting actual content boundaries mapped onto the Canvas grid
                const curLeft = nx - (imgW / 2) + cLeft;
                const curRight = nx - (imgW / 2) + cRight;
                const curCenterX = (curLeft + curRight) / 2;

                const curTop = ny - (imgH / 2) + cTop;
                const curBottom = ny - (imgH / 2) + cBottom;
                const curCenterY = (curTop + curBottom) / 2;

                // Threshold: Snap when within 20 screen-pixels
                const SNAP_T = 20 / visualScale;

                // X-Axis Magnetic Snapping
                if (Math.abs(curCenterX - target.w / 2) < SNAP_T) { nx = target.w / 2 + (imgW / 2) - (cLeft + cRight) / 2; guides.x = target.w / 2; }
                else if (Math.abs(curLeft - 0) < SNAP_T) { nx = (imgW / 2) - cLeft; guides.x = 0; }
                else if (Math.abs(curRight - target.w) < SNAP_T) { nx = target.w + (imgW / 2) - cRight; guides.x = target.w; }

                // Y-Axis Magnetic Snapping
                if (Math.abs(curCenterY - target.h / 2) < SNAP_T) { ny = target.h / 2 + (imgH / 2) - (cTop + cBottom) / 2; guides.y = target.h / 2; }
                else if (Math.abs(curTop - 0) < SNAP_T) { ny = (imgH / 2) - cTop; guides.y = 0; }
                else if (Math.abs(curBottom - target.h) < SNAP_T) { ny = target.h + (imgH / 2) - cBottom; guides.y = target.h; }
              }

              snapGuidesRef.current = guides;
              setTransform(p => ({ ...p, x: nx, y: ny }));
            }
          }
        }
      };

      const getDynamicCursor = () => {
        if (isCropMode) return cropHoverCursor;
        if (!isEraserActive) return 'move';
        
        // Draw an exact double-ringed SVG target scaled to your brush, reduced by 20% for precision
        const screenBrushSize = Math.max(4, Math.floor(brushSize * 0.8));
        const size = Math.min(128, screenBrushSize + 4); 
        const r = screenBrushSize / 2;
        
        const svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1.5"/><circle cx="${size/2}" cy="${size/2}" r="${r-1}" fill="none" stroke="white" stroke-width="1"/></svg>`;
        const encodedSvg = btoa(svg);
        return `url('data:image/svg+xml;base64,${encodedSvg}') ${size/2} ${size/2}, default`;
      };

      const handleFinalize = () => {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = images.original.width;
        finalCanvas.height = images.original.height;
        const fCtx = finalCanvas.getContext('2d');
        const active = isBgRemoved ? images.processed : images.original;
        fCtx.drawImage(active, 0, 0);
        if (eraserMaskRef.current) {
          fCtx.globalCompositeOperation = 'destination-out';
          fCtx.drawImage(eraserMaskRef.current, 0, 0);
        }
        onConfirm(transform, paper, finalCanvas.toDataURL());
      };

      const handleSnap = (direction) => {
        const activeImg = isBgRemoved ? images.processed : images.original;
        if (!activeImg) return;
        const target = paper === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
        const bounds = contentBoundsRef.current || detectContentBounds(activeImg);
        
        setTransform(p => {
          let nx = p.x, ny = p.y;
          const imgW = activeImg.width * p.scale;
          const imgH = activeImg.height * p.scale;
          
          const cLeft = bounds.x * p.scale;
          const cRight = (bounds.x + bounds.w) * p.scale;
          const cTop = bounds.y * p.scale;
          const cBottom = (bounds.y + bounds.h) * p.scale;

          if (direction === 'left') nx = (imgW / 2) - cLeft;
          if (direction === 'center-h') nx = target.w / 2 + (imgW / 2) - (cLeft + cRight) / 2;
          if (direction === 'right') nx = target.w + (imgW / 2) - cRight;
          
          if (direction === 'up') ny = (imgH / 2) - cTop;
          if (direction === 'center-v') ny = target.h / 2 + (imgH / 2) - (cTop + cBottom) / 2;
          if (direction === 'down') ny = target.h + (imgH / 2) - cBottom;
          
          return { ...p, x: nx, y: ny };
        });
      };

      return (
        <div className="fixed inset-0 z-[100] bg-slate-100 flex flex-col md:flex-row animate-in fade-in duration-150 touch-none select-none">
          <div className="flex-1 bg-[#e2e8f0] relative flex items-center justify-center overflow-hidden p-4 md:p-8" 
               onMouseDown={(e) => handleInteraction('start', e)}
               onMouseMove={(e) => handleInteraction('move', e)} 
               onMouseUp={(e) => handleInteraction('end', e)} 
               onTouchStart={(e) => handleInteraction('start', e)}
               onTouchMove={(e) => handleInteraction('move', e)}
               onTouchEnd={(e) => handleInteraction('end', e)}>
            <div className="relative w-full h-full flex items-center justify-center pointer-events-none">
              <canvas ref={canvasRef} 
                      draggable={false}
                      style={{ cursor: getDynamicCursor() }}
                      onDragStart={(e) => e.preventDefault()}
                      onDrop={(e) => e.preventDefault()}
                      className={`max-w-full max-h-full object-contain bg-white studio-canvas-bg rounded-sm touch-none pointer-events-auto`} />
            </div>
          </div>
          
          <div className="w-full md:w-[260px] bg-white p-4 flex flex-col justify-between border-l border-slate-200 z-40 relative overflow-y-auto">
            <div className="space-y-6">
              <div className="flex justify-between items-center pb-2 border-b">
                <h2 className="font-roboto-bold text-sm text-slate-800 uppercase tracking-tighter">Edit Design</h2>
                <div className="flex gap-1.5 items-center">
                   <button onClick={undo} disabled={!canUndo} className={`p-1.5 rounded-full transition-colors ${canUndo ? 'text-slate-700 hover:bg-slate-100 active:bg-slate-200' : 'text-slate-300'}`} title="Undo (Ctrl+Z)"><Icon path={Paths.Undo} size={14} /></button>
                   <button onClick={redo} disabled={!canRedo} className={`p-1.5 rounded-full transition-colors ${canRedo ? 'text-slate-700 hover:bg-slate-100 active:bg-slate-200' : 'text-slate-300'}`} title="Redo (Ctrl+Y)"><Icon path={Paths.Redo} size={14} /></button>
                   <div className="w-px h-4 bg-slate-200 mx-1"></div>
                   <button onClick={onCancel} className="p-1.5 bg-slate-50 rounded-full hover:bg-slate-200 duration-100 text-slate-600"><Icon path={Paths.Close} size={14} /></button>
                </div>
              </div>
              
              <div>
                <span className="text-[10px] font-black uppercase text-slate-400 block mb-2">Paper & Adjustments</span>
                <div className="flex bg-slate-100 p-1 rounded-lg mb-3">{['A4', 'A3'].map(size => (<button key={size} onClick={() => setPaper(size)} className={`flex-1 py-1.5 text-[10px] font-black uppercase rounded-md transition-all duration-100 ${paper === size ? 'bg-white text-black shadow-sm' : 'text-slate-400'}`}>{size}</button>))}</div>
                
                <div className="grid grid-cols-3 gap-2">
                  <button onClick={() => setIsBgRemoved(!isBgRemoved)} className={`flex flex-col items-center justify-center py-2 border rounded-xl transition-all duration-100 ${isBgRemoved ? 'bg-black text-white border-black' : 'bg-white text-slate-500 border-slate-200'}`}><Icon path={Paths.Eraser} size={16} className="mb-1" /> <span className="text-[9px] font-bold uppercase">No BG</span></button>
                  <button onClick={() => setIsInverted(!isInverted)} className={`flex flex-col items-center justify-center py-2 border rounded-xl transition-all duration-100 ${isInverted ? 'bg-black text-white border-black' : 'bg-white text-slate-500 border-slate-200'}`}><Icon path={Paths.Invert} size={16} className="mb-1" /> <span className="text-[9px] font-bold uppercase">Invert</span></button>
                  <button onClick={() => { 
                      const newMode = !isCropMode;
                      setIsCropMode(newMode); 
                      setIsEraserActive(false); 
                      if (newMode && images.original) {
                          const active = isBgRemoved ? (images.processed || images.original) : images.original;
                          const bounds = detectContentBounds(active);
                          setCropBox({ x: bounds.x, y: bounds.y, w: bounds.w, h: bounds.h });
                      } else {
                          setCropBox(null); 
                      }
                  }} className={`flex flex-col items-center justify-center py-2 border rounded-xl transition-all duration-100 ${isCropMode ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 border-slate-200'}`}><Icon path={Paths.Crop} size={16} className="mb-1" /> <span className="text-[9px] font-bold uppercase">Crop</span></button>
                </div>
                
                {isCropMode && (
                  <div className="mt-3 p-3 bg-blue-50 border border-blue-100 rounded-xl animate-in fade-in zoom-in-95">
                     <span className="text-[10px] font-black uppercase text-blue-600 block mb-1">Crop Active</span>
                     <p className="text-[10px] text-blue-500 mb-3 leading-tight">Click and drag on the canvas to draw your crop area.</p>
                     <div className="flex gap-2">
                       <button onClick={applyCrop} className="flex-1 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-[9px] font-bold uppercase tracking-widest active:scale-95 transition-all">Apply</button>
                       <button onClick={() => { setIsCropMode(false); setCropBox(null); render(); }} className="flex-1 py-2 bg-white text-slate-500 hover:bg-slate-50 border border-slate-200 rounded-lg text-[9px] font-bold uppercase tracking-widest active:scale-95 transition-all">Cancel</button>
                     </div>
                  </div>
                )}
              </div>

              <div>

    // Simple hash function to prevent duplicate uploads
    const generateHash = (str) => {
      let hash = 0;
      for (let i = 0, len = str.length; i < len; i++) {
        let chr = str.charCodeAt(i);
        hash = (hash << 5) - hash + chr;
        hash |= 0; 
      }
      return Math.abs(hash).toString(36);
    };

    // ============================================================================
    // NATIVE BROWSER DATABASE (No Firebase, 100% Free, Instant Saving)
    // ============================================================================
    const localDB = {
      init: () => new Promise((resolve, reject) => {
        const req = indexedDB.open('JeStudiosWorkspace', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('designs', { keyPath: 'id' });
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      }),
      save: async (data) => {
        const db = await localDB.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('designs', 'readwrite');
          tx.objectStore('designs').put(data);
          tx.oncomplete = resolve; tx.onerror = reject;
        });
      },
      getAll: async () => {
        const db = await localDB.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('designs', 'readonly');
          const req = tx.objectStore('designs').getAll();
          req.onsuccess = () => resolve(req.result.sort((a,b) => b.createdAt - a.createdAt));
          req.onerror = reject;
        });
      },
      delete: async (id) => {
        const db = await localDB.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('designs', 'readwrite');
          tx.objectStore('designs').delete(id);
          tx.oncomplete = resolve; tx.onerror = reject;
        });
      }
    };

    function App() {
      // Firebase State (Kept only for Auth if needed elsewhere)
      const [user, setUser] = useState(null);
      const [cloudDesigns, setCloudDesigns] = useState([]);
      const [isCloudModalOpen, setIsCloudModalOpen] = useState(false);

      const [selectedDriver, setSelectedDriver] = useState(null);
      const [uploadedImage, setUploadedImage] = useState(null); 
      const [rawImage, setRawImage] = useState(null); 
      const [processedImage, setProcessedImage] = useState(null); 
      const [isStudioOpen, setIsStudioOpen] = useState(false);
      const [isBgRemoved, setIsBgRemoved] = useState(true);
      const [isInverted, setIsInverted] = useState(false);
      const [fitMode, setFitMode] = useState('width');
      const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
      const [paperSize, setPaperSize] = useState("A4");
      const [editorScale, setEditorScale] = useState(1);
      const [activeIndex, setActiveIndex] = useState(0);
      const [isDragOver, setIsDragOver] = useState(false);
      const [isPinModalOpen, setIsPinModalOpen] = useState(false);
      const [pinUrl, setPinUrl] = useState("");
      const [isFetchingPin, setIsFetchingPin] = useState(false);
      const [pinError, setPinError] = useState("");
      const [showUploadMenu, setShowUploadMenu] = useState(true);
      const [isProcessingFile, setIsProcessingFile] = useState(false);

      const dragCounter = useRef(0);
      const fileInputRef = useRef(null);
      const carouselRef = useRef(null);
      const grabRef = useRef({ isDown: false, startX: 0, startY: 0, scrollLeft: 0, scrollTop: 0 });
      const draggedDistance = useRef(0);
      const pinInputRef = useRef(null);

      const VIEWS = ['front', 'back', 'detail'];
      const DOWNLOAD_VIEWS = ['front', 'back', 'detail', 'fabric', 'size'];

      // Firebase Initialization (Stripped down to just basic auth)
      useEffect(() => {
        let unsubscribeAuth = () => {};
        const initFirebase = async () => {
          try {
            const { initializeApp } = await loadFirebase('firebase-app.js');
            const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = await loadFirebase('firebase-auth.js');

            const app = initializeApp(PRODUCTION_FIREBASE_CONFIG);
            const auth = getAuth(app);

            const initAuth = async () => {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try { await signInWithCustomToken(auth, __initial_auth_token); } 
                catch (e) { await signInAnonymously(auth); }
              } else {
                await signInAnonymously(auth);
              }
            };
            await initAuth();
            unsubscribeAuth = onAuthStateChanged(auth, setUser);
          } catch (err) {
            console.error("Firebase init error:", err);
          }
        };
        initFirebase();
        return () => unsubscribeAuth();
      }, []);

      // Load Designs from Local Device Storage
      const loadWorkspace = async () => {
        try {
          const designs = await localDB.getAll();
          setCloudDesigns(designs);
        } catch (error) {
          console.error("Error loading local workspace:", error);
        }
      };

      useEffect(() => {
        loadWorkspace();
      }, []);

      // Autofocus for Pin URL input
      useEffect(() => {
        if (isPinModalOpen) {
          const timer = setTimeout(() => {
            if (pinInputRef.current) pinInputRef.current.focus();
          }, 100);
          return () => clearTimeout(timer);
        }
      }, [isPinModalOpen]);

      useEffect(() => {
        const updateScale = () => { if (carouselRef.current) { const canvas = carouselRef.current.querySelector('.canvas-wrapper'); if (canvas) setEditorScale(canvas.getBoundingClientRect().height / CANVAS_SIZE); } };
        updateScale(); window.addEventListener('resize', updateScale);
        const obs = new ResizeObserver(updateScale); if (carouselRef.current) obs.observe(carouselRef.current);
        return () => { window.removeEventListener('resize', updateScale); obs.disconnect(); };
      }, [isStudioOpen, selectedDriver]);

      const handleCarouselScroll = (e) => {
        if (!e.target || e.target.clientWidth === 0 || e.target.clientHeight === 0) return;
        const isVert = window.innerWidth < 768;
        const index = isVert ? Math.round(e.target.scrollTop / e.target.clientHeight) : Math.round(e.target.scrollLeft / e.target.clientWidth);
        if (index !== activeIndex && index >= 0 && index < VIEWS.length) setActiveIndex(index);
      };

      const handleGrabStart = (e) => {
        grabRef.current.isDown = true;
        draggedDistance.current = 0;
        grabRef.current.startX = (e.touches ? e.touches[0].pageX : e.pageX) - carouselRef.current.offsetLeft;
        grabRef.current.startY = (e.touches ? e.touches[0].pageY : e.pageY) - carouselRef.current.offsetTop;
        grabRef.current.scrollLeft = carouselRef.current.scrollLeft;
        grabRef.current.scrollTop = carouselRef.current.scrollTop;
      };

      const handleGrabMove = (e) => {
        if (!grabRef.current.isDown) return;
        if (!e.touches) e.preventDefault();
        const curX = (e.touches ? e.touches[0].pageX : e.pageX) - carouselRef.current.offsetLeft;
        const curY = (e.touches ? e.touches[0].pageY : e.pageY) - carouselRef.current.offsetTop;
        
        const dx = curX - grabRef.current.startX;
        const dy = curY - grabRef.current.startY;
        draggedDistance.current = Math.sqrt(dx*dx + dy*dy);

        if (window.innerWidth < 768) { carouselRef.current.scrollTop = grabRef.current.scrollTop - dy * 1.5; } 
        else { carouselRef.current.scrollLeft = grabRef.current.scrollLeft - dx * 1.5; }
      };

      const handleGrabEnd = () => { grabRef.current.isDown = false; };

      const handleCarouselClick = () => {
        if (draggedDistance.current > 10) return;
        setShowUploadMenu(p => !p);
      };

      useEffect(() => {
        if (!rawImage) return;
        const gen = async () => {
          const imgObj = new Image(); imgObj.onload = () => {
            const activeImg = isBgRemoved ? processedImage : imgObj; if (!activeImg) return;
            const target = paperSize === "A4" ? { w: A4.w, h: A4.h } : { w: A3.w, h: A3.h };
            const tmp = document.createElement('canvas'); tmp.width = target.w; tmp.height = target.h;
            const c = tmp.getContext('2d'); c.save(); c.translate(transform.x, transform.y); c.scale(transform.scale, transform.scale);
            if (isInverted) c.filter = 'invert(1)'; c.drawImage(activeImg, -activeImg.width/2, -activeImg.height/2);
            if (isInverted) c.filter = 'none'; c.restore(); setUploadedImage(tmp.toDataURL());
          };
          imgObj.src = rawImage;
        };
        gen();
      }, [rawImage, processedImage, transform, isBgRemoved, isInverted, paperSize]);

      const processFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        setShowUploadMenu(false);
        setIsProcessingFile(true);
        const reader = new FileReader(); reader.onload = async (ev) => {
          const img = new Image(); img.onload = async () => {
            setTimeout(async () => {
              setRawImage(ev.target.result); const proc = await createProcessedImage(img); setProcessedImage(proc);
              const bounds = detectContentBounds(proc); const targetSize = (bounds.w > bounds.h) ? { w: A4.w, h: A4.h, name: "A4" } : { w: A3.w, h: A3.h, name: "A3" };
              const sW = targetSize.w / bounds.w; const sH = targetSize.h / bounds.h; const initialScale = Math.min(sW, sH);
              
              const defaultY = (img.height * initialScale / 2) - bounds.y * initialScale;
              
              setPaperSize(targetSize.name); 
              setTransform({ 
                x: targetSize.w / 2 - (bounds.x + bounds.w / 2 - img.width / 2) * initialScale, 
                y: defaultY, 
                scale: initialScale 
              });
              setFitMode(sW < sH ? 'width' : 'height'); setIsBgRemoved(true); setIsInverted(false);
              setIsProcessingFile(false);
            }, 50);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const downloadMockup = async () => {
        // --- 1. Local Download Mockup Generation (PRIORITY) ---
        for (const type of DOWNLOAD_VIEWS) {
          if (type === 'back' && !selectedDriver) continue;
          const canvas = document.createElement('canvas'); canvas.width = CANVAS_SIZE; canvas.height = CANVAS_SIZE;
          const ctx = canvas.getContext('2d'); ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, canvas.width, canvas.height);
          let src = `garment/garment-${garmentColor}.png`; let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
          if (type === 'back') { src = `garment/garment-${garmentColor}-${selectedDriver}.png`; pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 }; }

          const gImg = new Image(); await new Promise(r => { gImg.onload = r; gImg.onerror = r; gImg.src = src; });
          if (gImg.naturalWidth) ctx.drawImage(gImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
          if (type === 'front' && selectedDriver) {

            if (dImg.naturalWidth) { const dw = 650; const dh = (dImg.naturalHeight/dImg.naturalWidth)*dw; ctx.drawImage(dImg, -85, CANVAS_SIZE - dh - (CANVAS_SIZE * -1.30), dw, dh); }
          }

            const aw = pos.w;

            tc.globalAlpha = garmentColor === 'black' ? 0.98 : 0.94;

            tc.globalCompositeOperation = 'multiply';

            tc.drawImage(gImg, -pos.l, -pos.t, CANVAS_SIZE, CANVAS_SIZE);
            
            tc.globalCompositeOperation = 'screen';
            tc.globalAlpha = garmentColor === 'black' ? 0.25 : 0.15;
            tc.drawImage(gImg, -pos.l, -pos.t, CANVAS_SIZE, CANVAS_SIZE);
            
            tc.globalCompositeOperation = 'destination-in';
            tc.globalAlpha = 1.0;
            tc.drawImage(aImg, 0, 0, aw, ah);
            
            ctx.globalCompositeOperation = 'source-over'; 
            ctx.globalAlpha = 1.0;
            ctx.drawImage(tempCanvas, pos.l, pos.t, aw, ah);
          }
          const link = document.createElement('a'); link.download = `Jestudios_${type}_${Date.now()}.png`; link.href = canvas.toDataURL('image/png'); link.click();
          await new Promise(r => setTimeout(r, 400));
        }

        // --- 2. Save Print File to Local Workspace (BACKGROUND) ---
        if (uploadedImage) {

        const file = e.target.files[0];
        if (!file) return;
        setSaveStatus("Restoring Backup...");
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            const importedData = JSON.parse(ev.target.result);
            if (!Array.isArray(importedData)) throw new Error("Invalid format");
            
            for (const design of importedData) {
              if (design.id && design.fullImage) {
                await localDB.save(design);
              }
            }
            await loadWorkspace();
            setSaveStatus("Workspace Restored!");
            setTimeout(() => setSaveStatus(""), 3000);
          } catch (error) {
            console.error("Import failed:", error);
            setSaveStatus("Invalid Backup File");
            setTimeout(() => setSaveStatus(""), 3000);
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // Reset input
      };
      // -------------------------------------------

      const handleCopyScript = () => {
        const textArea = document.createElement("textarea");
        textArea.value = SCRIPT_TEXT;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        textArea.style.top = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          setSaveStatus("Script Copied!");
          setTimeout(() => setSaveStatus(""), 3000);
        } catch (err) {
          console.error('Unable to copy', err);
          setSaveStatus("Copy failed");
          setTimeout(() => setSaveStatus(""), 3000);
        }
        textArea.remove();
      };

      const handleDragEvent = (type, e) => { e.preventDefault(); if (type === 'enter') dragCounter.current++; else if (type === 'leave') dragCounter.current--; else if (type === 'drop') { dragCounter.current = 0; setIsDragOver(false); if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]); return; } setIsDragOver(dragCounter.current > 0); };

      const handleUrlSubmit = async (e) => {
        e.preventDefault();
        if (!pinUrl.trim()) return;
        setIsFetchingPin(true);
        setPinError("");
        try {
          let targetImgUrl = pinUrl.trim();
          
          if (targetImgUrl.includes('pinterest.') || targetImgUrl.includes('pin.it')) {
            let html = "";
            try {
              const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetImgUrl)}`);
              if (!res.ok) throw new Error("Primary proxy failed");
              html = await res.text();
            } catch (err1) {
              const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetImgUrl)}`);
              if (!res.ok) throw new Error("Fallback proxy failed");
              const data = await res.json();
              html = data.contents;
            }
            
            let extractedUrl = null;
            const ogMatch = html.match(/<meta[^>]*(?:property|name)="og:image"[^>]*content="([^"]+)"/i) || 
                            html.match(/content="([^"]+)"[^>]*(?:property|name)="og:image"/i) ||
                            html.match(/<link[^>]*rel="image_src"[^>]*href="([^"]+)"/i);
            
            if (ogMatch && ogMatch[1] && ogMatch[1].includes('pinimg.com')) {
              extractedUrl = ogMatch[1];
            } else {
              const origMatch = html.match(/https:\\?\/\\?\/i\.pinimg\.com\\?\/originals\\?\/[^"'\s\\]+\.(?:jpg|jpeg|png|webp)/i);
              const highResMatch = html.match(/https:\\?\/\\?\/i\.pinimg\.com\\?\/736x\\?\/[^"'\s\\]+\.(?:jpg|jpeg|png|webp)/i);
              const anyPinimgMatch = html.match(/https:\\?\/\\?\/i\.pinimg\.com\\?\/[a-z0-9_]+\\?\/[^"'\s\\]+\.(?:jpg|jpeg|png|webp)/i);
              
              if (origMatch) extractedUrl = origMatch[0];
              else if (highResMatch) extractedUrl = highResMatch[0];
              else if (anyPinimgMatch) extractedUrl = anyPinimgMatch[0];
            }
            
            if (extractedUrl) {
              targetImgUrl = extractedUrl.replace(/\\u002F/g, '/').replace(/\\\//g, '/');
            } else {
              throw new Error("No image found. Ensure it's a valid public Pin.");
            }
          }

          let blob;
          try {
            const imgRes = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetImgUrl)}`);
            if (!imgRes.ok) throw new Error("Failed to fetch image data");
            blob = await imgRes.blob();
          } catch (err2) {
            const imgRes = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetImgUrl)}`);
            if (!imgRes.ok) throw new Error("Fallback proxy failed to fetch image");
            blob = await imgRes.blob();
          }
          
          const file = new File([blob], "imported_image.jpg", { type: blob.type || "image/jpeg" });
          
          processFile(file);
          setIsPinModalOpen(false);
          setPinUrl("");
        } catch (err) {
          console.error(err);
          setPinError(err.message || "Failed to load image. Check the URL and try again.");
        } finally {
          setIsFetchingPin(false);
        }
      };

      const renderView = (type) => {
        let src = `garment/garment-${garmentColor}.png`; let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
        const wrapperClass = "flex-none w-full md:w-auto h-auto md:h-full md:max-h-[65vh] aspect-square flex items-center justify-center p-2 md:p-4";
        if (type === 'back' && !selectedDriver) return (<div key={`${type}-${garmentColor}-${selectedDriver}`} className={wrapperClass}><div className="canvas-wrapper relative bg-[#f8fafc] w-full h-full flex flex-col items-center justify-center rounded-2xl border border-slate-200"><span className="text-slate-400 font-medium text-[10px] text-center px-4">Select driver to view back</span></div></div>);
        if (type === 'back') { src = `garment/garment-${garmentColor}-${selectedDriver}.png`; pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 }; }
        else if (type === 'detail') { src = `garment/garment-${garmentColor}-detail.png`; pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; }
        const showArt = uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail');
        return (
          <div key={`${type}-${garmentColor}-${selectedDriver}`} className={wrapperClass}>
            <div className="canvas-wrapper relative bg-white w-full h-full overflow-hidden rounded-2xl border border-slate-100">
              <div style={{ width: CANVAS_SIZE, height: CANVAS_SIZE, transform: `scale(${editorScale})`, transformOrigin: 'top left', position: 'absolute', top: 0, left: 0 }}>
                <img key={src} src={src} className="w-full h-full absolute inset-0 object-cover pointer-events-none" onError={(e) => { e.target.style.display='none'; }} onLoad={(e) => { e.target.style.display='block'; }}/>
                {type === 'front' && selectedDriver && <img src={DRIVERS.find(d=>d.id===selectedDriver).image} className="absolute pointer-events-none" style={{ width: 650, left: -85, bottom: '-130%', zIndex: 5 }} onError={(e) => { e.target.style.display='none'; }} />}
                {showArt && <div className="absolute" style={{ left: pos.l, top: pos.t, width: pos.w, zIndex: 10 }}><canvas ref={el => { 
                  if (el && uploadedImage) { 
                    const c = el.getContext('2d'); 
                    const i = new Image(); 
                    i.onload = () => { 
                      el.width = pos.w; 
                      const ah = (i.naturalHeight/i.naturalWidth)*pos.w;
                      el.height = ah; 
                      
                      const gImg = new Image();
                      gImg.onload = () => {
                         c.globalAlpha = garmentColor === 'black' ? 0.98 : 0.94; 
                         c.globalCompositeOperation = 'source-over'; 
                         c.drawImage(i, 0, 0, pos.w, ah); 
                         
                         c.globalCompositeOperation = 'multiply';
                         c.globalAlpha = garmentColor === 'black' ? 0.05 : 0.4;
                         c.drawImage(gImg, -pos.l, -pos.t, CANVAS_SIZE, CANVAS_SIZE);
                         
                         c.globalCompositeOperation = 'screen';
                         c.globalAlpha = garmentColor === 'black' ? 0.25 : 0.15;
                         c.drawImage(gImg, -pos.l, -pos.t, CANVAS_SIZE, CANVAS_SIZE);
                         
                         c.globalCompositeOperation = 'destination-in';
                         c.globalAlpha = 1.0;
                         c.drawImage(i, 0, 0, pos.w, ah);
                      };
                      gImg.src = src; 
                    }; 
                    i.src = uploadedImage; 
                  } 
                }} className="w-full pointer-events-none" /></div>}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="h-screen w-full flex flex-col bg-slate-50 overflow-hidden relative" onDragEnter={(e) => handleDragEvent('enter', e)} onDragOver={(e) => e.preventDefault()} onDragLeave={(e) => handleDragEvent('leave', e)} onDrop={(e) => handleDragEvent('drop', e)}>
          
          {isProcessingFile && (
            <div className="absolute inset-0 z-[99999] bg-slate-900/40 flex flex-col items-center justify-center animate-in fade-in duration-200">
               <div className="line-loader mb-2"></div>
            </div>
          )}
          {saveStatus && (
            <div className="absolute bottom-24 left-1/2 -translate-x-1/2 z-[9999] bg-black/90 text-white px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wide animate-in slide-in-from-bottom-4 fade-in duration-200">
               {saveStatus}
            </div>
          )}

          <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={(e) => processFile(e.target.files[0])} />
          {isDragOver && <div className="absolute inset-0 z-[9999] bg-blue-500/20 m-3 border-4 border-dashed border-blue-500 rounded-3xl flex items-center justify-center pointer-events-none transition-all duration-100"><div className="bg-white px-8 py-6 rounded-3xl flex flex-col items-center gap-4 animate-in zoom-in-95 duration-100"><div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center"><Icon path={Paths.Upload} size={28} className="text-blue-500" /></div><div className="text-center"><h3 className="font-roboto-bold text-xl text-slate-800">Drop Design</h3><p className="text-slate-500 text-sm mt-1">Release to upload</p></div></div></div>}
          <PWAInstallPrompt />
          
          {isPinModalOpen && (
            <div className="fixed inset-0 z-[9999] bg-slate-900/60 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-150">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-roboto-bold text-lg text-slate-800">Import Image</h3>
                  <button onClick={() => { setIsPinModalOpen(false); setPinError(""); }} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 transition-colors">
                    <Icon path={Paths.Close} size={16} />
                  </button>
                </div>
                <form onSubmit={handleUrlSubmit}>
                  <p className="text-slate-500 text-[13px] mb-4">Paste a Pinterest link or direct image URL to download & apply.</p>
                  {pinError && (
                    <div className="mb-4 p-3 bg-red-50 text-red-600 text-xs rounded-xl border border-red-100">
                      {pinError}
                    </div>
                  )}
                  <input 
                    ref={pinInputRef}
                    type="url" 
                    placeholder="https://pin.it/..." 
                    required
                    value={pinUrl}
                    onChange={(e) => { setPinUrl(e.target.value); setPinError(""); }}
                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4 bg-slate-50 text-sm"
                  />
                  <button 
                    type="submit" 
                    disabled={isFetchingPin}
                    className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2"
                  >
                    {isFetchingPin ? (
                      <><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Fetching...</>
                    ) : (
                      "Download & Apply"
                    )}
                  </button>
                </form>
              </div>
            </div>
          )}

          {isStudioOpen && <ArtworkStudio rawImage={rawImage} initialTransform={transform} initialPaper={paperSize} isBgRemoved={isBgRemoved} setIsBgRemoved={setIsBgRemoved} isInverted={isInverted} setIsInverted={setIsInverted} onConfirm={(t, p, newRaw) => { setTransform(t); setPaperSize(p); if (newRaw) { setRawImage(newRaw); const img = new Image(); img.onload = () => setProcessedImage(img); img.src = newRaw; } setIsStudioOpen(false); }} onCancel={() => setIsStudioOpen(false)} />}
          
          <div className="flex-1 w-full relative flex flex-col items-center justify-center bg-[#f8fafc] overflow-hidden">
             {/* Cloud Designs Modal overlaying the canvas */}
             {isCloudModalOpen && (
               <div className="absolute inset-0 z-50 bg-white flex flex-col animate-in slide-in-from-bottom-8 fade-in duration-200 overflow-hidden">
                   
                   {/* Workspace Header with Backup Controls */}
                   <div className="flex items-center justify-between p-4 border-b border-slate-100 bg-white shrink-0">
                     <div>
                       <h2 className="font-roboto-bold text-lg text-slate-800">Local Workspace</h2>
                       <p className="text-xs text-slate-500 font-medium mt-0.5">Stored securely on this device</p>
                     </div>
                     <div className="flex items-center gap-2">
                       <label className="cursor-pointer px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider transition-colors flex items-center gap-1.5">
                         <Icon path={Paths.Upload} size={14} /> Import
                         <input type="file" accept=".json" className="hidden" onChange={importWorkspace} />
                       </label>
                       <button onClick={exportWorkspace} className="px-3 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-xl text-xs font-bold uppercase tracking-wider transition-colors flex items-center gap-1.5">
                         <Icon path={Paths.Download} size={14} /> Backup
                       </button>
                     </div>
                   </div>

                   <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50 relative">
                     {isDownloadingCloud && (
                       <div className="absolute inset-0 z-20 bg-white/90 flex flex-col items-center justify-center">
                          <div className="line-loader mb-2"></div>
                          <span className="text-xs font-bold text-slate-600 uppercase tracking-widest mt-2">Preparing File...</span>
                       </div>
                     )}

                     {cloudDesigns.length === 0 ? (
                       <div className="h-full flex flex-col items-center justify-center text-slate-400">
                         <Icon path={Paths.Upload} size={48} className="mb-4 opacity-50" />
                         <p className="text-sm font-medium">Your Workspace is empty.</p>
                         <p className="text-xs mt-1">Export a mockup to backup your print files automatically.</p>
                       </div>
                     ) : (
                       <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 md:gap-6">
                         {cloudDesigns.map(design => (
                           <div key={design.id} className="bg-white border rounded-2xl p-3 flex flex-col group hover:shadow-md transition-shadow">
                             <div className="aspect-[3/4] bg-slate-100 rounded-xl mb-3 overflow-hidden relative flex items-center justify-center">
                               <img src={design.thumbnail} className="max-w-[80%] max-h-[80%] object-contain" />
                               <div className="absolute top-2 right-2 bg-black/60 text-white text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">
                                 {design.paperSize || "A4"}
                               </div>
                             </div>
                             <div className="flex justify-between items-center mt-auto">
                               <span className="text-xs text-slate-500 font-medium">
                                 {new Date(design.createdAt).toLocaleDateString()}
                               </span>
                               <div className="flex gap-1">
                                 <button onClick={() => deleteCloudDesign(design)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                   <Icon path={Paths.Trash} size={14} />
                                 </button>
                                 <button onClick={() => downloadCloudDesign(design)} className="p-1.5 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white rounded-lg transition-colors">
                                   <Icon path={Paths.Download} size={14} />
                                 </button>
                               </div>
                             </div>
                           </div>
                         ))}
                       </div>
                     )}
                   </div>
               </div>
             )}

             {showUploadMenu && (
               <div className="absolute inset-0 z-20 flex items-center justify-center pointer-events-none bg-slate-900/40 transition-all">
                 <div className="flex gap-5 pointer-events-auto animate-in zoom-in-95 duration-150">
                   <button onClick={(e) => { e.stopPropagation(); fileInputRef.current.click(); }} className="flex flex-col items-center justify-center w-28 h-28 bg-white border border-slate-100 rounded-[2rem] shadow-2xl hover:scale-105 active:scale-95 transition-all text-slate-700 hover:text-blue-600">
                     <div className="w-12 h-12 rounded-full bg-blue-50 shadow-sm flex items-center justify-center mb-2">
                       <Icon path={Paths.Upload} size={24} className="text-blue-600" />
                     </div>
                     <span className="text-[11px] font-black uppercase tracking-wider text-slate-800">Upload</span>
                   </button>
                   <button onClick={(e) => { e.stopPropagation(); setIsPinModalOpen(true); setShowUploadMenu(false); }} className="flex flex-col items-center justify-center w-28 h-28 bg-white border border-slate-100 rounded-[2rem] shadow-2xl hover:scale-105 active:scale-95 transition-all text-slate-700 hover:text-blue-600">
                     <div className="w-12 h-12 rounded-full bg-blue-50 shadow-sm flex items-center justify-center mb-2">
                       <Icon path={Paths.Link} size={24} className="text-blue-600" />
                     </div>
                     <span className="text-[11px] font-black uppercase tracking-wider text-slate-800">Link</span>
                   </button>
                 </div>
               </div>
             )}

             <div ref={carouselRef} onScroll={handleCarouselScroll} onClick={handleCarouselClick} onMouseDown={handleGrabStart} onMouseMove={handleGrabMove} onMouseUp={handleGrabEnd} onMouseLeave={handleGrabEnd} onTouchStart={handleGrabStart} onTouchMove={handleGrabMove} onTouchEnd={handleGrabEnd} className="flex flex-col md:flex-row w-full h-full overflow-y-auto md:overflow-y-hidden md:overflow-x-auto hide-scrollbar items-center justify-start cursor-default px-4">
                {VIEWS.map((v) => renderView(v))}
             </div>
             <div className="absolute bottom-6 left-0 right-0 flex justify-center gap-1.5 z-10 pointer-events-none md:hidden">
                {VIEWS.map((_, i) => (<div key={i} className={`h-1 rounded-full transition-all duration-150 ${i === activeIndex ? 'w-4 bg-blue-500' : 'w-1 bg-slate-300'}`} />))}
             </div>
          </div>

          <div className="w-full bg-white border-t border-slate-200 z-40 shrink-0">
            <div className="flex flex-col gap-3 p-3 w-full max-w-screen-2xl mx-auto">
              <div className="flex items-center gap-3 w-full">
                <div className="flex gap-2 shrink-0 border-r pr-3 border-slate-100">{['black', 'white'].map(c => (<button key={c} onClick={() => setGarmentColor(c)} className={`w-8 h-8 rounded-full border-2 transition-transform duration-100 ${c === 'black' ? 'bg-black' : 'bg-[#f8fafc]'} ${garmentColor === c ? 'border-black scale-110' : 'border-slate-100'}`} />))}</div>
                <div className="flex-1 overflow-x-auto hide-scrollbar flex gap-2 py-1">
                   <button onClick={() => setSelectedDriver(null)} className={`relative w-9 h-9 rounded-full shrink-0 flex items-center justify-center transition-all duration-100 border ${selectedDriver === null ? 'border-black scale-110 z-10 bg-slate-100' : 'opacity-70 border-slate-200 bg-white'}`} title="No Driver"><Icon path={Paths.Block} size={18} className="text-slate-400" /></button>
                   {DRIVERS.map(d => (<button key={d.id} onClick={() => setSelectedDriver(d.id)} className={`relative w-9 h-9 rounded-full shrink-0 transition-all duration-100 overflow-hidden border ${selectedDriver === d.id ? 'border-black scale-110 z-10' : 'opacity-70 border-slate-200'}`}><div className={`absolute inset-0 ${d.color}`} /><img src={d.image} className="absolute top-[10%] w-[40px] left-1/2 -translate-x-1/2" onError={(e) => { e.target.style.display='none'; }}/></button>))}
                </div>
              </div>
              <div className="flex items-center gap-2 w-full overflow-x-auto hide-scrollbar">
                <button onClick={() => setIsStudioOpen(true)} className="flex-[2] min-w-[80px] h-10 border rounded-xl bg-white flex items-center justify-center duration-100 shrink-0 gap-2" title="Edit Design">
                  <Icon path={Paths.Edit} size={16} />
                  <span className="text-[11px] font-black uppercase tracking-widest text-slate-800 hidden sm:inline">Edit Design</span>
                </button>
                <div className="h-6 w-px bg-slate-200 shrink-0 mx-1"></div>
                <button onClick={() => setIsCloudModalOpen(!isCloudModalOpen)} className={`flex-1 min-w-[40px] h-10 border rounded-xl flex items-center justify-center active:scale-95 duration-100 shrink-0 ${isCloudModalOpen ? 'border-red-200 bg-red-50 text-red-600' : 'border-blue-200 bg-blue-50 text-blue-600'}`} title={isCloudModalOpen ? "Close Workspace" : "Open Workspace"}>
                  <Icon path={isCloudModalOpen ? Paths.Close : Paths.Cloud} size={16} />
                </button>
                <button onClick={handleCopyScript} className="flex-1 min-w-[40px] h-10 border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 rounded-xl flex items-center justify-center active:scale-95 duration-100 shrink-0" title="Copy Description Script">
                  <span className="font-black font-roboto-bold text-[15px]">S</span>
                </button>
                <button onClick={downloadMockup} className="flex-[2] min-w-[80px] h-10 bg-black text-white rounded-xl flex items-center justify-center active:scale-95 duration-100 shrink-0 gap-2" title="Download">
                  <Icon path={Paths.Download} size={16} />
                  <span className="text-[11px] font-black uppercase tracking-widest text-white hidden sm:inline">Export</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
