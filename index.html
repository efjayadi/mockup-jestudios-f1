<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>T-Shirt Mockup Editor</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Styles for hiding scrollbar in horizontal carousel -->
  <style>
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-white text-slate-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- Inline Icon Components (Replacing lucide-react for standalone HTML) ---
    const Download = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    );
    const Upload = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
    );
    const RefreshCcw = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
    );

    // --- Configuration ---
    const CANVAS_SIZE = 1080;
    
    // Canvas 1 (Front) Configuration
    const PRINT_WIDTH_1 = 320;
    const PRINT_TOP_1 = 320;

    // Canvas 2 (Back) Configuration
    const PRINT_WIDTH_2 = 300;
    const PRINT_TOP_2 = 500;

    // Canvas 3 (Detail) Configuration
    const PRINT_WIDTH_3 = 190;
    const PRINT_TOP_3 = 240;
    const PRINT_LEFT_3 = 200;

    const DRIVERS = [
      { id: 'george', image: 'drivers/george.webp', color: 'bg-[#00A19B]' },
      { id: 'kimi', image: 'drivers/kimi.webp', color: 'bg-[#00A19B]' },
      { id: 'max', image: 'drivers/max.webp', color: 'bg-[#0600EF]' },
      { id: 'isack', image: 'drivers/isack.webp', color: 'bg-[#0600EF]' },
      { id: 'charles', image: 'drivers/charles.webp', color: 'bg-[#E80020]' },
      { id: 'lewis', image: 'drivers/lewis.webp', color: 'bg-[#E80020]' },
      { id: 'lando', image: 'drivers/lando.webp', color: 'bg-[#FF8000]' },
      { id: 'oscar', image: 'drivers/oscar.webp', color: 'bg-[#FF8000]' },
      { id: 'fernando', image: 'drivers/fernando.webp', color: 'bg-[#229971]' },
      { id: 'lance', image: 'drivers/lance.webp', color: 'bg-[#229971]' },
      { id: 'alexander', image: 'drivers/alexander.webp', color: 'bg-[#005AFF]' },
      { id: 'carlos', image: 'drivers/carlos.webp', color: 'bg-[#005AFF]' },
      { id: 'pierre', image: 'drivers/pierre.webp', color: 'bg-[#FF9BFF]' },
      { id: 'franco', image: 'drivers/franco.webp', color: 'bg-[#FF9BFF]' },
      { id: 'esteban', image: 'drivers/esteban.webp', color: 'bg-[#B6BABD]' },
      { id: 'oliver', image: 'drivers/oliver.webp', color: 'bg-[#B6BABD]' },
      { id: 'liam', image: 'drivers/liam.webp', color: 'bg-[#6692FF]' },
      { id: 'arvid', image: 'drivers/arvid.webp', color: 'bg-[#6692FF]' },
      { id: 'nico', image: 'drivers/nico.webp', color: 'bg-[#00E701]' },
      { id: 'gabriel', image: 'drivers/gabriel.webp', color: 'bg-[#00E701]' },
      { id: 'sergio', image: 'drivers/sergio.webp', color: 'bg-[#0600EF]' },
      { id: 'valtteri', image: 'drivers/valtteri.webp', color: 'bg-[#00E701]' }
    ];

    function App() {
      // Garment & Artwork state
      const [garmentColor, setGarmentColor] = useState('black');
      const [selectedDriver, setSelectedDriver] = useState(null);
      const [uploadedImage, setUploadedImage] = useState(null);
      
      const [editorScale, setEditorScale] = useState(1);

      // Refs
      const containerRef = useRef(null);
      const fileInputRef = useRef(null);
      const imageRef = useRef(null);

      // --- Responsive Canvas Scale ---
      useEffect(() => {
        const updateScale = () => {
          if (containerRef.current) {
            const { width } = containerRef.current.getBoundingClientRect();
            setEditorScale(width / CANVAS_SIZE);
          }
        };
        
        updateScale();
        const observer = new ResizeObserver(updateScale);
        if (containerRef.current) observer.observe(containerRef.current);
        
        return () => observer.disconnect();
      }, [selectedDriver]); 

      // --- Handlers ---
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = (event) => setUploadedImage(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      // --- Export Logic (Downloads multiple individual PNGs) ---
      const downloadMockup = async () => {
        
        // --- FUNCTION TO GENERATE AND DOWNLOAD A SINGLE CANVAS ---
        const exportSingleCanvas = async (drawOperations, filename) => {
          const canvas = document.createElement('canvas');
          canvas.width = CANVAS_SIZE;
          canvas.height = CANVAS_SIZE;
          const ctx = canvas.getContext('2d');
          
          // Base Background Fill
          ctx.fillStyle = '#f8fafc'; 
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Execute custom drawing logic for this specific canvas
          await drawOperations(ctx);

          // Trigger Download
          const dataUrl = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.download = filename;
          link.href = dataUrl;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };

        // --- 1. GENERATE FRONT CANVAS ---
        await exportSingleCanvas(async (ctx) => {
          const garment1Img = new Image();
          await new Promise(r => { garment1Img.onload = r; garment1Img.onerror = r; garment1Img.src = `garment/garment-${garmentColor}.png`; });
          if (garment1Img.naturalWidth > 0) {
            ctx.drawImage(garment1Img, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
          }

          const activeDriver = DRIVERS.find(d => d.id === selectedDriver);
          if (activeDriver) {
            const driverImg = new Image();
            await new Promise(r => { driverImg.onload = r; driverImg.onerror = r; driverImg.src = activeDriver.image; });
            if (driverImg.naturalWidth > 0) {
              const driverRenderWidth = 650;
              const driverRenderHeight = (driverImg.naturalHeight / driverImg.naturalWidth) * driverRenderWidth;
              const drawX = -85; 
              const bottomOffset = CANVAS_SIZE * -1.30; 
              const drawY = CANVAS_SIZE - driverRenderHeight - bottomOffset;
              ctx.drawImage(driverImg, drawX, drawY, driverRenderWidth, driverRenderHeight);
            }
          }

          if (uploadedImage && imageRef.current) {
            const artNaturalWidth = imageRef.current.naturalWidth;
            const artNaturalHeight = imageRef.current.naturalHeight;
            const renderWidth = PRINT_WIDTH_1;
            const renderHeight = (artNaturalHeight / artNaturalWidth) * renderWidth;
            const drawX = (CANVAS_SIZE - PRINT_WIDTH_1) / 2;
            ctx.drawImage(imageRef.current, drawX, PRINT_TOP_1, renderWidth, renderHeight);
          }
        }, `mockup-${garmentColor}-front.png`);


        // --- 2. GENERATE BACK CANVAS (If driver selected) ---
        if (selectedDriver) {
          // Add a short delay to bypass browser protections against spam downloading
          await new Promise(r => setTimeout(r, 300));

          await exportSingleCanvas(async (ctx) => {
            const garment2Img = new Image();
            await new Promise(r => { garment2Img.onload = r; garment2Img.onerror = r; garment2Img.src = `garment/garment-${garmentColor}-${selectedDriver}.png`; });
            if (garment2Img.naturalWidth > 0) {
              ctx.drawImage(garment2Img, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
            }

            if (uploadedImage && imageRef.current) {
              const artNaturalWidth = imageRef.current.naturalWidth;
              const artNaturalHeight = imageRef.current.naturalHeight;
              const renderWidth = PRINT_WIDTH_2;
              const renderHeight = (artNaturalHeight / artNaturalWidth) * renderWidth;
              const drawX = (CANVAS_SIZE - PRINT_WIDTH_2) / 2;
              ctx.drawImage(imageRef.current, drawX, PRINT_TOP_2, renderWidth, renderHeight);
            }
          }, `mockup-${garmentColor}-${selectedDriver}-back.png`);
        }

        // --- 3. GENERATE DETAIL CANVAS ---
        // Short delay before the 3rd canvas download
        await new Promise(r => setTimeout(r, 300));

        await exportSingleCanvas(async (ctx) => {
          const garment3Img = new Image();
          await new Promise(r => { garment3Img.onload = r; garment3Img.onerror = r; garment3Img.src = `garment/garment-${garmentColor}-detail.png`; });
          if (garment3Img.naturalWidth > 0) {
            ctx.drawImage(garment3Img, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
          }

          if (uploadedImage && imageRef.current) {
            const artNaturalWidth = imageRef.current.naturalWidth;
            const artNaturalHeight = imageRef.current.naturalHeight;
            const renderWidth = PRINT_WIDTH_3;
            const renderHeight = (artNaturalHeight / artNaturalWidth) * renderWidth;
            const drawX = PRINT_LEFT_3;
            ctx.drawImage(imageRef.current, drawX, PRINT_TOP_3, renderWidth, renderHeight);
          }
        }, `mockup-${garmentColor}-detail.png`);

      };

      const activeDriverObj = DRIVERS.find(d => d.id === selectedDriver);

      return (
        <div className="min-h-[100dvh] font-sans flex flex-col md:flex-row bg-white">
          
          {/* Left Area - Canvas / Preview Carousel (Sticky) */}
          <div className="w-full md:flex-1 relative sticky top-0 z-40 bg-slate-50 border-b border-slate-200 md:border-b-0 md:border-r h-[50dvh] md:h-screen flex items-center justify-center overflow-hidden shadow-sm group">

            <div className="w-full h-full flex overflow-x-auto snap-x snap-mandatory hide-scrollbar items-center px-4 sm:px-8 gap-4 sm:gap-8 justify-start xl:justify-center">
              
              {/* --- CANVAS 1 (FRONT) --- */}
              <div 
                ref={(el) => { containerRef.current = el; }}
                className="relative shadow-md overflow-hidden flex items-center justify-center bg-white border border-slate-200 shrink-0 w-[calc(100vw-32px)] sm:w-[500px] md:w-[75vh] max-w-[500px] aspect-square rounded-xl snap-center"
              >
                <div 
                  style={{
                    width: `${CANVAS_SIZE}px`,
                    height: `${CANVAS_SIZE}px`,
                    transform: `scale(${editorScale})`,
                    transformOrigin: 'top left',
                    position: 'absolute',
                    top: 0,
                    left: 0
                  }}
                >
                  <img 
                    src={`garment/garment-${garmentColor}.png`} 
                    alt="Garment Front" 
                    className="w-full h-full object-cover pointer-events-none absolute top-0 left-0"
                  />
                  {activeDriverObj && (
                    <img 
                      src={activeDriverObj.image}
                      alt="Selected Driver"
                      className="absolute pointer-events-none"
                      style={{ width: '650px', left: '-85px', bottom: '-130%', zIndex: 5 }}
                    />
                  )}
                  {uploadedImage && (
                    <div 
                      className="absolute"
                      style={{
                        left: `${(CANVAS_SIZE - PRINT_WIDTH_1) / 2}px`,
                        top: `${PRINT_TOP_1}px`,
                        width: `${PRINT_WIDTH_1}px`,
                        zIndex: 10,
                      }}
                    >
                      <img 
                        ref={imageRef}
                        src={uploadedImage} 
                        alt="Artwork Front" 
                        className="w-full h-auto drop-shadow-md select-none"
                        draggable={false}
                      />
                    </div>
                  )}
                </div>
              </div>

              {/* --- CANVAS 2 (BACK) --- */}
              <div className="relative shadow-md overflow-hidden flex items-center justify-center bg-white border border-slate-200 shrink-0 w-[calc(100vw-32px)] sm:w-[500px] md:w-[75vh] max-w-[500px] aspect-square rounded-xl snap-center">
                <div 
                  style={{
                    width: `${CANVAS_SIZE}px`,
                    height: `${CANVAS_SIZE}px`,
                    transform: `scale(${editorScale})`,
                    transformOrigin: 'top left',
                    position: 'absolute',
                    top: 0,
                    left: 0
                  }}
                >
                  {/* Show garment back and artwork ONLY if a driver is selected, otherwise show a blank placeholder */}
                  {selectedDriver ? (
                    <>
                      <img 
                        src={`garment/garment-${garmentColor}-${selectedDriver}.png`} 
                        alt="Garment Back" 
                        className="w-full h-full object-cover pointer-events-none absolute top-0 left-0"
                      />
                      {uploadedImage && (
                        <div 
                          className="absolute"
                          style={{
                            left: `${(CANVAS_SIZE - PRINT_WIDTH_2) / 2}px`,
                            top: `${PRINT_TOP_2}px`,
                            width: `${PRINT_WIDTH_2}px`,
                            zIndex: 10,
                          }}
                        >
                          <img 
                            src={uploadedImage} 
                            alt="Artwork Back" 
                            className="w-full h-auto drop-shadow-md select-none"
                            draggable={false}
                          />
                        </div>
                      )}
                    </>
                  ) : (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-slate-50 border-4 border-dashed border-slate-200">
                      <span className="text-slate-400 font-medium text-2xl tracking-wide">Select a driver to view back</span>
                    </div>
                  )}
                </div>
              </div>

              {/* --- CANVAS 3 (DETAIL) --- */}
              <div className="relative shadow-md overflow-hidden flex items-center justify-center bg-white border border-slate-200 shrink-0 w-[calc(100vw-32px)] sm:w-[500px] md:w-[75vh] max-w-[500px] aspect-square rounded-xl snap-center">
                <div 
                  style={{
                    width: `${CANVAS_SIZE}px`,
                    height: `${CANVAS_SIZE}px`,
                    transform: `scale(${editorScale})`,
                    transformOrigin: 'top left',
                    position: 'absolute',
                    top: 0,
                    left: 0
                  }}
                >
                  <img 
                    src={`garment/garment-${garmentColor}-detail.png`} 
                    alt="Garment Detail" 
                    className="w-full h-full object-cover pointer-events-none absolute top-0 left-0"
                  />
                  {uploadedImage && (
                    <div 
                      className="absolute"
                      style={{
                        left: `${PRINT_LEFT_3}px`,
                        top: `${PRINT_TOP_3}px`,
                        width: `${PRINT_WIDTH_3}px`,
                        zIndex: 10,
                      }}
                    >
                      <img 
                        src={uploadedImage} 
                        alt="Artwork Detail" 
                        className="w-full h-auto drop-shadow-md select-none"
                        draggable={false}
                      />
                    </div>
                  )}
                </div>
              </div>

            </div>
          </div>

          {/* Right Area - Controls Panel (More Compact) */}
          <div className="w-full md:w-[380px] bg-white flex flex-col h-auto md:h-screen relative z-30">
            <div className="flex-1 overflow-y-auto p-4 md:p-5 space-y-5 pb-6">
              
              {/* Section 1: Garment Base */}
              <div className="flex gap-3">
                <button
                  onClick={() => setGarmentColor('black')}
                  className={`w-12 h-12 rounded-full bg-black border-2 shadow-sm transition-all ${garmentColor === 'black' ? 'border-red-500 ring-2 ring-red-500/50 scale-110' : 'border-slate-300 hover:scale-105'}`}
                  title="Black Garment"
                  aria-label="Black Garment"
                />
                <button
                  onClick={() => setGarmentColor('white')}
                  className={`w-12 h-12 rounded-full bg-[#f8fafc] border-2 shadow-sm transition-all ${garmentColor === 'white' ? 'border-red-500 ring-2 ring-red-500/50 scale-110' : 'border-slate-300 hover:scale-105'}`}
                  title="White Garment"
                  aria-label="White Garment"
                />
              </div>

              <hr className="border-slate-200" />

              {/* Section 2: Driver Selection Carousel (Smaller sizes, faster animation, increased pt-4 padding) */}
              <div className="flex overflow-x-auto gap-4 pt-4 pb-2 px-1 snap-x hide-scrollbar items-end">
                {DRIVERS.map(driver => (
                  <button
                    key={driver.id}
                    onClick={() => setSelectedDriver(driver.id)}
                    className={`relative w-[60px] h-[60px] rounded-full transition-all duration-150 ease-out focus:outline-none shrink-0 snap-center
                      ${selectedDriver === driver.id 
                        ? 'opacity-100 scale-[1.15] ring-4 ring-red-500 ring-offset-2 ring-offset-white shadow-[0_0_20px_rgba(239,68,68,0.4)] z-10' 
                        : 'opacity-80 hover:opacity-100 hover:scale-110 hover:-translate-y-1 hover:shadow-[0_0_15px_rgba(0,0,0,0.1)] z-0 hover:z-10'
                      }`}
                  >
                    <div className={`absolute inset-0 rounded-full ${driver.color} shadow-inner`}></div>
                    <div className="absolute bottom-0 left-0 w-full h-[120%] overflow-hidden rounded-b-[30px] pointer-events-none flex justify-center">
                      <img 
                        src={driver.image} 
                        alt="" 
                        className="absolute top-[2%] w-[72px] h-auto object-top drop-shadow-md left-1/2 -translate-x-1/2" 
                      />
                    </div>
                  </button>
                ))}
              </div>

              <hr className="border-slate-200" />

              {/* Section 3: Artwork Upload */}
              <div>
                <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />

                {!uploadedImage ? (
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-blue-500 transition-all group"
                  >
                    <div className="flex flex-col items-center justify-center">
                      <Upload className="w-6 h-6 mb-2 text-slate-400 group-hover:text-blue-500 transition-colors" />
                      <p className="text-sm text-slate-500">A4 Landscape / A3 Portrait</p>
                    </div>
                  </button>
                ) : (
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="w-full text-left bg-slate-50 hover:bg-slate-100 rounded-xl p-4 border border-slate-200 hover:border-blue-500 transition-all group focus:outline-none"
                  >
                    <div className="flex items-center gap-4">
                      <div className="w-16 h-16 rounded-lg bg-white flex items-center justify-center p-2 border border-slate-200 group-hover:border-blue-500 transition-all relative overflow-hidden shrink-0 shadow-sm">
                        <img src={uploadedImage} alt="Thumbnail" className="max-w-full max-h-full object-contain group-hover:opacity-30 transition-opacity" />
                        <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                          <RefreshCcw size={18} className="text-blue-500" />
                        </div>
                      </div>
                      <div className="flex-1 space-y-1 overflow-hidden">
                        <p className="text-sm font-medium text-slate-800 truncate">Artwork Locked</p>
                        <p className="text-xs text-slate-500 truncate group-hover:text-blue-500 transition-colors">Click anywhere to replace</p>
                      </div>
                    </div>
                  </button>
                )}
              </div>

              {/* Action Button (Now flows naturally, not sticky, narrower padding) */}
              <button 
                onClick={downloadMockup}
                className="w-full bg-black text-white px-5 py-2.5 rounded-xl font-bold flex justify-center items-center gap-2 active:scale-95 transition-transform mt-4"
              >
                <Download size={18} />
                <span>Save to Device</span>
              </button>

            </div>
          </div>

        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
