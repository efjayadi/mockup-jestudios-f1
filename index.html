  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- PWA INSTALL PROMPT COMPONENT ---
    const PWAInstallPrompt = () => {
      const [isVisible, setIsVisible] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isIOS, setIsIOS] = useState(false);

      useEffect(() => {
        // 1. Cek apakah sudah dalam mode standalone
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;

        // 2. Deteksi iOS
        const userAgent = window.navigator.userAgent.toLowerCase();
        const iosDetect = /iphone|ipad|ipod/.test(userAgent);
        setIsIOS(iosDetect);

        // 3. Listener untuk Android/Chrome
        const handler = (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
          setIsVisible(true);
        };

        window.addEventListener('beforeinstallprompt', handler);

        // 4. Manual Trigger untuk iOS (tanpa event prompt)
        if (iosDetect) {
          const timer = setTimeout(() => {
            setIsVisible(true);
          }, 2500);
          return () => clearTimeout(timer);
        }

        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const handleInstall = async () => {
        if (isIOS) {
          alert("To install: Tap the 'Share' icon in your browser bottom bar, then select 'Add to Home Screen' ➕");
          setIsVisible(false);
          return;
        }

        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            setDeferredPrompt(null);
            setIsVisible(false);
          }
        }
      };

      if (!isVisible) return null;

      return (
        <div className="fixed top-4 left-0 right-0 px-4 z-[9999] flex justify-center pointer-events-none">
          <div className="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white/20 shadow-2xl rounded-3xl p-3 flex items-center gap-3 animate-pwa-slide pointer-events-auto">
            {/* App Icon */}
            <div className="w-12 h-12 rounded-2xl bg-black flex-shrink-0 flex items-center justify-center overflow-hidden shadow-lg">
              <img src="icon-192.png" alt="Icon" className="w-full h-full object-cover" onerror="this.src='https://placehold.co/192x192/000/fff?text=JS'"/>
            </div>

            {/* Content */}
            <div className="flex-1 min-w-0">
              <h3 className="text-sm font-bold text-slate-900 truncate">Download this App</h3>
              <p className="text-[11px] text-slate-500 font-medium">Add to home screen for better experience</p>
            </div>

            {/* Actions */}
            <div className="flex items-center gap-2">
              <button 
                onClick={handleInstall}
                className="bg-blue-500 hover:bg-blue-600 active:scale-95 transition-all px-5 py-1.5 rounded-full text-white text-xs font-bold tracking-tight shadow-md shadow-blue-200"
              >
                Get
              </button>
              <button 
                onClick={() => setIsVisible(false)}
                className="p-1.5 text-slate-400 hover:text-slate-600 transition-colors"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 6L6 18M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      );
    };
