<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>T-Shirt Mockup & Artwork Studio</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    
    body { font-family: 'Inter', sans-serif; background: #fff; overscroll-behavior-y: contain; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .snap-x { scroll-snap-type: x mandatory; scroll-behavior: smooth; }
    .snap-center { scroll-snap-align: center; }

    /* Localized Checkerboard strictly for the canvas area */
    .studio-canvas-bg {
      background-color: #fff;
      background-image: linear-gradient(45deg, #eee 25%, transparent 25%), 
                        linear-gradient(-45deg, #eee 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #eee 75%), 
                        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const CANVAS_SIZE = 1080;
    const PRINT_WIDTH_1 = 320;
    const PRINT_TOP_1 = 320;
    const PRINT_WIDTH_2 = 290;
    const PRINT_TOP_2 = 510;
    const PRINT_WIDTH_3 = 188;
    const PRINT_TOP_3 = 236;
    const PRINT_LEFT_3 = 208;

    const A4 = { w: 2480, h: 3508 };
    const A3 = { w: 3508, h: 4961 };

    const DRIVERS = [
      { id: 'george', image: 'drivers/george.webp', color: 'bg-[#00A19B]' },
      { id: 'kimi', image: 'drivers/kimi.webp', color: 'bg-[#00A19B]' },
      { id: 'max', image: 'drivers/max.webp', color: 'bg-[#0600EF]' },
      { id: 'isack', image: 'drivers/isack.webp', color: 'bg-[#0600EF]' },
      { id: 'charles', image: 'drivers/charles.webp', color: 'bg-[#E80020]' },
      { id: 'lewis', image: 'drivers/lewis.webp', color: 'bg-[#E80020]' },
      { id: 'lando', image: 'drivers/lando.webp', color: 'bg-[#FF8000]' },
      { id: 'oscar', image: 'drivers/oscar.webp', color: 'bg-[#FF8000]' },
      { id: 'fernando', image: 'drivers/fernando.webp', color: 'bg-[#229971]' },
      { id: 'lance', image: 'drivers/lance.webp', color: 'bg-[#229971]' },
      { id: 'alexander', image: 'drivers/alexander.webp', color: 'bg-[#005AFF]' },
      { id: 'carlos', image: 'drivers/carlos.webp', color: 'bg-[#005AFF]' },
      { id: 'pierre', image: 'drivers/pierre.webp', color: 'bg-[#FF9BFF]' },
      { id: 'franco', image: 'drivers/franco.webp', color: 'bg-[#FF9BFF]' },
      { id: 'esteban', image: 'drivers/esteban.webp', color: 'bg-[#B6BABD]' },
      { id: 'oliver', image: 'drivers/oliver.webp', color: 'bg-[#B6BABD]' },
      { id: 'liam', image: 'drivers/liam.webp', color: 'bg-[#6692FF]' },
      { id: 'arvid', image: 'drivers/arvid.webp', color: 'bg-[#6692FF]' },
      { id: 'nico', image: 'drivers/nico.webp', color: 'bg-[#00E701]' },
      { id: 'gabriel', image: 'drivers/gabriel.webp', color: 'bg-[#00E701]' },
      { id: 'sergio', image: 'drivers/sergio.webp', color: 'bg-[#333333]' },
      { id: 'valtteri', image: 'drivers/valtteri.webp', color: 'bg-[#333333]' }
    ];

    const getPix = (x, y, data, w) => {
      const i = (y * w + x) * 4;
      return { r: data[i], g: data[i + 1], b: data[i + 2] };
    };

    const detectContentBounds = (img) => {
      const temp = document.createElement('canvas');
      temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const pixels = tCtx.getImageData(0, 0, img.width, img.height).data;
      let minX = img.width, minY = img.height, maxX = 0, maxY = 0;
      let found = false;
      const step = Math.max(1, Math.floor(img.width / 400));
      for (let y = 0; y < img.height; y += step) {
        for (let x = 0; x < img.width; x += step) {
          if (pixels[(y * img.width + x) * 4 + 3] > 15) {
            minX = Math.min(minX, x); maxX = Math.max(maxX, x);
            minY = Math.min(minY, y); maxY = Math.max(maxY, y);
            found = true;
          }
        }
      }
      return found ? { x: minX, y: minY, w: maxX - minX, h: maxY - minY } : { x: 0, y: 0, w: img.width, h: img.height };
    };

    const createProcessedImage = async (img) => {
      const temp = document.createElement('canvas');
      temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const imageData = tCtx.getImageData(0, 0, temp.width, temp.height);
      const data = imageData.data;

      const samples = [];
      const skip = Math.max(1, Math.floor(temp.width / 30));
      for (let x = 0; x < temp.width; x += skip) { samples.push(getPix(x, 0, data, temp.width)); samples.push(getPix(x, temp.height - 1, data, temp.width)); }
      for (let y = 0; y < temp.height; y += skip) { samples.push(getPix(0, y, data, temp.width)); samples.push(getPix(temp.width - 1, y, data, temp.width)); }
      
      const colorCounts = {};
      samples.forEach(c => {
        const key = `${Math.floor(c.r / 8)},${Math.floor(c.g / 8)},${Math.floor(c.b / 8)}`;
        colorCounts[key] = (colorCounts[key] || 0) + 1;
      });
      const topColorKey = Object.keys(colorCounts).reduce((a, b) => colorCounts[a] > colorCounts[b] ? a : b);
      const [bgR, bgG, bgB] = topColorKey.split(',').map(v => v * 8);

      for (let i = 0; i < data.length; i += 4) {
        const diff = (Math.abs(data[i] - bgR) + Math.abs(data[i+1] - bgG) + Math.abs(data[i+2] - bgB)) / 3;
        if (diff < 35) data[i + 3] = 0;
        else if (diff < 55) data[i+3] = ((diff - 35) / 20) * 255;
      }
      tCtx.putImageData(imageData, 0, 0);
      return new Promise(r => { const out = new Image(); out.onload = () => r(out); out.src = temp.toDataURL(); });
    };

    const Icon = ({ path, size = 18, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d={path} />
      </svg>
    );

    const Paths = {
      Upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
      Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
      Adjust: "M12 3v18M3 12h18",
      Refresh: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10",
      Close: "M18 6L6 18M6 6l12 12",
      Plus: "M12 5v14M5 12h14",
      Minus: "M5 12h14",
      Edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"
    };

    function ArtworkStudio({ rawImage, initialTransform, initialPaper, onConfirm, onCancel }) {
      const canvasRef = useRef(null);
      const [bgRemoved, setBgRemoved] = useState(true);
      const [images, setImages] = useState({ original: null, processed: null });
      const [transform, setTransform] = useState(initialTransform);
      const [isProcessing, setIsProcessing] = useState(true);
      
      const isDragging = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });
      const startDist = useRef(0);
      const startScale = useRef(1);

      const baseScale = useRef(initialTransform.scale);

      useEffect(() => {
        const img = new Image();
        img.onload = async () => {
          const proc = await createProcessedImage(img);
          setImages({ original: img, processed: proc });
          setIsProcessing(false);
        };
        img.src = rawImage;
      }, [rawImage]);

      const render = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !images.original) return;
        const ctx = canvas.getContext('2d');
        const target = initialPaper === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
        canvas.width = target.w; canvas.height = target.h;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(transform.x, transform.y);
        ctx.scale(transform.scale, transform.scale);
        const active = bgRemoved ? images.processed : images.original;
        const bounds = detectContentBounds(images.processed);
        ctx.drawImage(active, bounds.x, bounds.y, bounds.w, bounds.h, -bounds.w/2, -bounds.h/2, bounds.w, bounds.h);
        ctx.restore();
      }, [images, transform, bgRemoved, initialPaper]);

      useEffect(() => { render(); }, [render]);

      const handleTouchStart = (e) => {
        if (e.touches.length === 2) {
          e.preventDefault();
          startDist.current = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          startScale.current = transform.scale;
        } else {
          isDragging.current = true;
          lastPos.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        }
      };

      const handleTouchMove = (e) => {
        if (!canvasRef.current) return;
        const rect = canvasRef.current.getBoundingClientRect();
        const ratio = canvasRef.current.width / rect.width;
        if (e.touches.length === 2) {
          e.preventDefault();
          const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          setTransform(p => ({ ...p, scale: startScale.current * (dist / startDist.current) }));
        } else if (isDragging.current) {
          const dx = (e.touches[0].pageX - lastPos.current.x) * ratio;
          const dy = (e.touches[0].pageY - lastPos.current.y) * ratio;
          setTransform(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
          lastPos.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        }
      };

      const fineAdjust = (type, amount) => {
        if (type === 'scale') setTransform(p => ({ ...p, scale: p.scale + (p.scale * amount) }));
        if (type === 'x') setTransform(p => ({ ...p, x: p.x + amount }));
        if (type === 'y') setTransform(p => ({ ...p, y: p.y + amount }));
      };

      const handleZoomInput = (val) => {
        const num = parseFloat(val);
        if (isNaN(num)) return;
        setTransform(p => ({ ...p, scale: (num / 100) * baseScale.current }));
      };

      const displayZoom = Math.round((transform.scale / baseScale.current) * 100);

      return (
        <div className="fixed inset-0 z-[100] bg-slate-100 flex flex-col md:flex-row p-0 animate-in fade-in duration-300">
          <div className="flex-1 bg-slate-200 relative flex items-center justify-center overflow-hidden">
            <div className="relative shadow-2xl">
              <canvas 
                ref={canvasRef} 
                className="max-w-[95%] max-h-[80vh] bg-white border border-slate-300 studio-canvas-bg"
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={() => isDragging.current = false}
              />
              <div className="absolute -top-10 left-0 bg-black text-white text-[9px] px-2 py-1 rounded font-black uppercase tracking-widest">{initialPaper} Print Boundary</div>
            </div>
            
            {isProcessing && <div className="absolute inset-0 bg-white/80 flex items-center justify-center font-black uppercase text-xs z-50">Calibrating...</div>}
            
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-black/80 backdrop-blur-md p-2 rounded-2xl shadow-xl z-30">
               <button onClick={() => fineAdjust('scale', -0.01)} className="w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/20 text-white rounded-xl active:scale-95"><Icon path={Paths.Minus}/></button>
               <div className="flex flex-col items-center">
                  <span className="text-white text-[8px] font-black uppercase opacity-60">Zoom %</span>
                  <input 
                    type="number" 
                    value={displayZoom} 
                    onChange={(e) => handleZoomInput(e.target.value)}
                    className="w-16 bg-transparent text-white text-center font-black text-sm focus:outline-none"
                  />
               </div>
               <button onClick={() => fineAdjust('scale', 0.01)} className="w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/20 text-white rounded-xl active:scale-95"><Icon path={Paths.Plus}/></button>
            </div>
          </div>

          <div className="w-full md:w-[380px] bg-white p-6 md:p-8 flex flex-col justify-between border-l border-slate-200 shadow-2xl z-40">
            <div className="space-y-8">
              <div className="flex justify-between items-center">
                <h2 className="font-black text-2xl tracking-tighter uppercase italic">Artwork Studio</h2>
                <button onClick={onCancel} className="p-2 bg-slate-50 rounded-full hover:bg-slate-100 transition-colors"><Icon path={Paths.Close} /></button>
              </div>
              
              <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between">
                <div>
                  <p className="text-xs font-black uppercase tracking-tight">Remove Background</p>
                  <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 italic tracking-wider">Dynamic Masking</p>
                </div>
                <button onClick={() => setBgRemoved(!bgRemoved)} className={`w-12 h-6 rounded-full transition-all relative ${bgRemoved ? 'bg-black' : 'bg-slate-300'}`}>
                  <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${bgRemoved ? 'left-7' : 'left-1'}`} />
                </button>
              </div>

              <div className="grid grid-cols-2 gap-4">
                 <div className="space-y-2">
                    <p className="text-[10px] font-black uppercase text-slate-400 px-1 italic tracking-widest leading-none">Axis Horizontal</p>
                    <div className="flex items-center gap-2">
                       <button onClick={() => fineAdjust('x', -1)} className="flex-1 h-12 bg-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200 transition-colors"><Icon path="M15 18l-6-6 6-6"/></button>
                       <button onClick={() => fineAdjust('x', 1)} className="flex-1 h-12 bg-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200 transition-colors"><Icon path="M9 18l6-6-6-6"/></button>
                    </div>
                 </div>
                 <div className="space-y-2">
                    <p className="text-[10px] font-black uppercase text-slate-400 px-1 italic tracking-widest leading-none">Axis Vertical</p>
                    <div className="flex items-center gap-2">
                       <button onClick={() => fineAdjust('y', -1)} className="flex-1 h-12 bg-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200 transition-colors"><Icon path="M18 15l-6-6-6 6"/></button>
                       <button onClick={() => fineAdjust('y', 1)} className="flex-1 h-12 bg-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200 transition-colors"><Icon path="M18 9l-6 6-6-6"/></button>
                    </div>
                 </div>
              </div>
            </div>
            <button 
              onClick={() => onConfirm(canvasRef.current.toDataURL('image/png'), transform)}
              className="w-full py-5 bg-black text-white rounded-3xl font-black uppercase tracking-widest text-sm shadow-xl mt-8 active:scale-95 transition-all"
            >Confirm Settings</button>
          </div>
        </div>
      );
    }

    function App() {
      const [garmentColor, setGarmentColor] = useState('black');
      const [selectedDriver, setSelectedDriver] = useState(null);
      const [uploadedImage, setUploadedImage] = useState(null);
      const [rawImage, setRawImage] = useState(null);
      const [isStudioOpen, setIsStudioOpen] = useState(false);
      const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
      const [paperSize, setPaperSize] = useState("A4");
      const [editorScale, setEditorScale] = useState(1);
      
      const containerRef = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        const updateScale = () => {
          if (containerRef.current) {
            // Find a slide element to get actual responsive width
            const slide = containerRef.current.querySelector('.snap-center');
            if (slide) {
               const rect = slide.getBoundingClientRect();
               setEditorScale(rect.width / CANVAS_SIZE);
            }
          }
        };
        updateScale();
        const obs = new ResizeObserver(updateScale);
        if (containerRef.current) obs.observe(containerRef.current);
        return () => obs.disconnect();
      }, [isStudioOpen, selectedDriver]);

      const handleUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const img = new Image();
          img.onload = async () => {
            setRawImage(ev.target.result);
            const proc = await createProcessedImage(img);
            const bounds = detectContentBounds(proc);
            const isLandscape = bounds.w > bounds.h;
            const targetSize = isLandscape ? "A4" : "A3";
            const target = isLandscape ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
            const scale = Math.max(target.w / bounds.w, target.h / bounds.h);
            setPaperSize(targetSize);
            setTransform({ x: target.w / 2, y: target.h / 2, scale });
            
            const temp = document.createElement('canvas');
            temp.width = target.w; temp.height = target.h;
            const ctx = temp.getContext('2d');
            ctx.translate(target.w/2, target.h/2);
            ctx.scale(scale, scale);
            ctx.drawImage(proc, bounds.x, bounds.y, bounds.w, bounds.h, -bounds.w/2, -bounds.h/2, bounds.w, bounds.h);
            setUploadedImage(temp.toDataURL());
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const activeDriver = DRIVERS.find(d => d.id === selectedDriver);

      const renderView = (type) => {
        let garmentSrc = `garment/garment-${garmentColor}.png`;
        let printPos = { left: (CANVAS_SIZE-PRINT_WIDTH_1)/2, top: PRINT_TOP_1, width: PRINT_WIDTH_1 };

        if (type === 'back' && selectedDriver) {
          garmentSrc = `garment/garment-${garmentColor}-${selectedDriver}.png`;
          printPos = { left: (CANVAS_SIZE-PRINT_WIDTH_2)/2, top: PRINT_TOP_2, width: PRINT_WIDTH_2 };
        } else if (type === 'detail') {
          garmentSrc = `garment/garment-${garmentColor}-detail.png`;
          printPos = { left: PRINT_LEFT_3, top: PRINT_TOP_3, width: PRINT_WIDTH_3 };
        } else if (type === 'fabric') garmentSrc = `garment-${garmentColor}-fabric.png`;
        else if (type === 'size') garmentSrc = `size-chart.png`;
        else if (type === 'cta' && selectedDriver) garmentSrc = `cta-${selectedDriver}.png`;

        const showArtwork = uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail');

        return (
          <div key={type} className="relative shadow-2xl bg-white shrink-0 w-[calc(100vw-32px)] sm:w-[500px] md:w-[75vh] max-w-[500px] aspect-square snap-center overflow-hidden rounded-2xl border border-slate-100 transition-all duration-500">
            <div style={{ 
              width: CANVAS_SIZE, 
              height: CANVAS_SIZE, 
              transform: `scale(${editorScale})`, 
              transformOrigin: 'top left', 
              position: 'absolute', 
              top: 0, 
              left: 0 
            }}>
              <img src={garmentSrc} className="w-full h-full absolute inset-0 object-cover" />
              {type === 'front' && activeDriver && (
                <img src={activeDriver.image} className="absolute" style={{ width: 650, left: -85, bottom: '-130%', zIndex: 5 }} />
              )}
              {showArtwork && (
                <div className="absolute" style={{ left: printPos.left, top: printPos.top, width: printPos.width, zIndex: 10 }}>
                  <img src={uploadedImage} className="w-full h-auto drop-shadow-2xl" />
                </div>
              )}
            </div>
            {((type === 'back' || type === 'cta') && !selectedDriver) && (
              <div className="absolute inset-0 bg-slate-50 flex items-center justify-center text-[10px] font-black uppercase text-slate-400">Select driver to view</div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col md:flex-row overflow-hidden bg-white">
          {isStudioOpen && (
            <ArtworkStudio 
              rawImage={rawImage} 
              initialTransform={transform} 
              initialPaper={paperSize}
              onConfirm={(img, t) => { setUploadedImage(img); setTransform(t); setIsStudioOpen(false); }}
              onCancel={() => setIsStudioOpen(false)}
            />
          )}

          <div ref={containerRef} className="w-full md:flex-1 relative sticky top-0 bg-slate-50 h-[50dvh] md:h-screen flex items-center justify-center overflow-hidden border-r border-slate-200 p-4">
            <div className="w-full h-full flex overflow-x-auto snap-x hide-scrollbar items-center gap-8 px-4">
              {['front', 'back', 'detail', 'fabric', 'size', 'cta'].map(v => renderView(v))}
            </div>
          </div>

          <div className="w-full md:w-[400px] bg-white p-6 md:p-8 flex flex-col h-auto md:h-screen overflow-y-auto shadow-2xl z-20">
            <div className="flex-1 space-y-8">
              <div className="flex gap-4">
                {['black', 'white'].map(c => (
                  <button key={c} onClick={() => setGarmentColor(c)} className={`w-14 h-14 rounded-full border-4 transition-all shadow-sm ${c === 'black' ? 'bg-black' : 'bg-slate-50'} ${garmentColor === c ? 'border-red-600 scale-110 shadow-lg' : 'border-slate-200 hover:scale-105'}`} />
                ))}
              </div>

              <div className="flex overflow-x-auto gap-4 py-4 hide-scrollbar items-end">
                {DRIVERS.map(d => (
                  <button key={d.id} onClick={() => setSelectedDriver(d.id)} className={`relative w-16 h-16 rounded-full shrink-0 transition-all overflow-hidden ${selectedDriver === d.id ? 'scale-125 ring-4 ring-red-600 z-10 shadow-xl' : 'opacity-80 hover:opacity-100 hover:scale-110'}`}>
                    <div className={`absolute inset-0 ${d.color}`} />
                    <img src={d.image} className="absolute top-[12%] w-[85px] left-1/2 -translate-x-1/2 drop-shadow-md" />
                  </button>
                ))}
              </div>

              <div className="space-y-4">
                <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleUpload} />
                {!uploadedImage ? (
                  <button onClick={() => fileInputRef.current.click()} className="w-full h-32 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 flex flex-col items-center justify-center gap-2 group hover:bg-slate-100 transition-all">
                    <Icon path={Paths.Upload} className="text-slate-300 group-hover:text-black transition-colors" />
                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Upload Raw Artwork</span>
                  </button>
                ) : (
                  <div className="flex h-16 w-full rounded-2xl overflow-hidden border border-slate-200 shadow-sm">
                    <button 
                      onClick={() => fileInputRef.current.click()}
                      className="flex-[3.2] flex items-center gap-4 bg-slate-50 hover:bg-slate-100 px-4 transition-colors border-r border-slate-200"
                    >
                      <div className="w-10 h-10 bg-white rounded-lg border border-slate-200 overflow-hidden shadow-xs">
                        <img src={uploadedImage} className="w-full h-full object-contain" />
                      </div>
                      <div className="text-left">
                        <p className="text-[10px] font-black uppercase tracking-tight text-slate-800 leading-tight">Replace Art</p>
                        <p className="text-[9px] text-slate-400 font-bold uppercase truncate max-w-[140px] leading-tight mt-0.5">Pinterest / Sketches</p>
                      </div>
                    </button>
                    <button 
                      onClick={() => setIsStudioOpen(true)}
                      className="flex-1 bg-white hover:bg-slate-50 flex items-center justify-center transition-colors active:bg-slate-100"
                      title="Adjust Artwork"
                    >
                      <Icon path={Paths.Edit} size={20} className="text-slate-600" />
                    </button>
                  </div>
                )}
              </div>

              <button className="w-full py-5 bg-black text-white rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <Icon path={Paths.Download} />
                Save to Device
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
