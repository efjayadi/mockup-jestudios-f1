  <!-- Google Fonts: Inter & Roboto -->

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Roboto:wght@700&display=swap');
    
    body { font-family: 'Inter', sans-serif; background: #fff; overscroll-behavior-y: contain; }

      background-color: #fff;
      background-image: linear-gradient(45deg, #eee 25%, transparent 25%), 
                        linear-gradient(-45deg, #eee 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #eee 75%), 
                        linear-gradient(-45deg, transparent 75%, #eee 75%);

      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }
    
    .font-roboto-bold { font-family: 'Roboto', sans-serif; font-weight: 700; }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const CANVAS_SIZE = 1080;
    const PRINT_WIDTH_1 = 320;
    const PRINT_TOP_1 = 320;
    const PRINT_WIDTH_2 = 290;
    const PRINT_TOP_2 = 510;
    const PRINT_WIDTH_3 = 188;
    const PRINT_TOP_3 = 236;
    const PRINT_LEFT_3 = 208;

    const A4 = { w: 2480, h: 3508 };
    const A3 = { w: 3508, h: 4961 };

    const DRIVERS = [
      { id: 'george', image: 'drivers/george.webp', color: 'bg-[#00A19B]', team: 'mercedes' },
      { id: 'kimi', image: 'drivers/kimi.webp', color: 'bg-[#00A19B]', team: 'mercedes' },

      { id: 'charles', image: 'drivers/charles.webp', color: 'bg-[#E80020]', team: 'ferrari' },
      { id: 'lewis', image: 'drivers/lewis.webp', color: 'bg-[#E80020]', team: 'ferrari' },

      { id: 'carlos', image: 'drivers/carlos.webp', color: 'bg-[#005AFF]', team: 'williams' },
      { id: 'pierre', image: 'drivers/pierre.webp', color: 'bg-[#FF9BFF]', team: 'alpine' },
      { id: 'franco', image: 'drivers/franco.webp', color: 'bg-[#FF9BFF]', team: 'alpine' },

    const Icon = ({ path, size = 18, className = "", fill = "none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d={path} />
      </svg>
    );

    const Paths = {
      Upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
      Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
      Expand: "M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7",
      Eraser: "M20 20H7L3 16C2 15 2 13 3 12L13 2C14 1 16 1 17 2L21 6C22 7 22 9 21 10L12 19",
      Edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z",
      Verify: "M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z",
      Close: "M18 6L6 18M6 6l12 12",
      Plus: "M12 5v14M5 12h14",
      Minus: "M5 12h14",
      Copy: "M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3",
      Check: "M5 13l4 4L19 7"
    };

    const createProcessedImage = async (img) => {
      const temp = document.createElement('canvas');
      temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const imageData = tCtx.getImageData(0, 0, temp.width, temp.height);
      const data = imageData.data;
      const samples = [];
      const skip = Math.max(1, Math.floor(temp.width / 30));
      for (let x = 0; x < temp.width; x += skip) { 
        const i1 = (0 * temp.width + x) * 4;
        samples.push({ r: data[i1], g: data[i1+1], b: data[i1+2] });
        const i2 = ((temp.height - 1) * temp.width + x) * 4;
        samples.push({ r: data[i2], g: data[i2+1], b: data[i2+2] });
      }
      const counts = {};
      samples.forEach(c => { const k = `${Math.floor(c.r/8)},${Math.floor(c.g/8)},${Math.floor(c.b/8)}`; counts[k] = (counts[k]||0)+1; });
      const topColorKey = Object.keys(counts).length > 0 ? Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b) : "255,255,255";
      const [bgR, bgG, bgB] = topColorKey.split(',').map(v => v * 8);
      for (let i = 0; i < data.length; i += 4) {
        const d = (Math.abs(data[i]-bgR) + Math.abs(data[i+1]-bgG) + Math.abs(data[i+2]-bgB)) / 3;
        if (d < 35) data[i+3] = 0; else if (d < 55) data[i+3] = ((d-35)/20)*255;
      }
      tCtx.putImageData(imageData, 0, 0);
      return new Promise(r => { const o = new Image(); o.onload = () => r(o); o.src = temp.toDataURL(); });
    };

    const detectContentBounds = (img) => {
      const temp = document.createElement('canvas');
      temp.width = img.width; temp.height = img.height;
      const tCtx = temp.getContext('2d');
      tCtx.drawImage(img, 0, 0);
      const pixels = tCtx.getImageData(0, 0, img.width, img.height).data;
      let minX = img.width, minY = img.height, maxX = 0, maxY = 0, found = false;
      for (let y = 0; y < img.height; y += 10) {
        for (let x = 0; x < img.width; x += 10) {
          if (pixels[(y * img.width + x) * 4 + 3] > 15) {
            minX = Math.min(minX, x); maxX = Math.max(maxX, x);
            minY = Math.min(minY, y); maxY = Math.max(maxY, y);
            found = true;
          }
        }
      }
      return found ? { x: minX, y: minY, w: maxX - minX, h: maxY - minY } : { x: 0, y: 0, w: img.width, h: img.height };
    };

    function ArtworkStudio({ rawImage, initialTransform, initialPaper, isBgRemoved, onConfirm, onCancel }) {
      const canvasRef = useRef(null);
      const [images, setImages] = useState({ original: null, processed: null });
      const [transform, setTransform] = useState(initialTransform);
      const [paper, setPaper] = useState(initialPaper);
      const [isProcessing, setIsProcessing] = useState(true);
      const isDragging = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });
      const startDist = useRef(0);
      const startScale = useRef(1);
      const baseScale = useRef(initialTransform.scale);

      useEffect(() => {
        const img = new Image();
        img.onload = async () => {
          const proc = await createProcessedImage(img);
          setImages({ original: img, processed: proc });
          setIsProcessing(false);
        };
        img.src = rawImage;
      }, [rawImage]);

      const render = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !images.original) return;
        const ctx = canvas.getContext('2d');
        const target = paper === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
        canvas.width = target.w; canvas.height = target.h;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(transform.x, transform.y);
        ctx.scale(transform.scale, transform.scale);
        const active = isBgRemoved ? images.processed : images.original;
        ctx.drawImage(active, -active.width/2, -active.height/2);
        ctx.restore();
      }, [images, transform, isBgRemoved, paper]);

      useEffect(() => { render(); }, [render]);

      const handleTouchStart = (e) => {
        if (e.touches.length === 2) {
          e.preventDefault();
          startDist.current = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          startScale.current = transform.scale;
        } else {
          isDragging.current = true;
          lastPos.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        }
      };

      const handleTouchMove = (e) => {
        if (!canvasRef.current) return;
        const rect = canvasRef.current.getBoundingClientRect();
        const ratio = canvasRef.current.width / rect.width;
        if (e.touches.length === 2) {
          e.preventDefault();
          const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          setTransform(p => ({ ...p, scale: startScale.current * (dist / startDist.current) }));
        } else if (isDragging.current) {
          const dx = (e.touches[0].pageX - lastPos.current.x) * ratio;
          const dy = (e.touches[0].pageY - lastPos.current.y) * ratio;
          setTransform(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
          lastPos.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        }
      };

      const displayZoom = Math.round((transform.scale / baseScale.current) * 100);

      return (
        <div className="fixed inset-0 z-[100] bg-slate-100 flex flex-col md:flex-row animate-in fade-in duration-300">
          <div className="flex-1 bg-[#e2e8f0] relative flex items-center justify-center overflow-hidden">
            <div className="flex flex-col items-center justify-center w-full h-full p-8">
              <div className="relative">
                <canvas 
                  ref={canvasRef} 
                  className="max-w-full max-h-[80vh] bg-white studio-canvas-bg shadow-xl"
                  onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={() => isDragging.current = false}
                />
                
                <div className="absolute -top-10 left-0 flex bg-white border border-slate-200 p-0.5 rounded-full overflow-hidden shadow-sm">
                   {['A4', 'A3'].map(size => (
                     <button 
                       key={size}
                       onClick={() => setPaper(size)}
                       className={`px-4 py-1 text-[8px] font-black uppercase rounded-full transition-colors ${paper === size ? 'bg-black text-white' : 'text-slate-400 hover:text-black'}`}
                     >
                       {size}
                     </button>
                   ))}
                </div>
              </div>
            </div>
            
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-black/85 backdrop-blur-md p-2 rounded-2xl z-30">
               <button onClick={() => setTransform(p => ({...p, scale: p.scale*0.99}))} className="w-10 h-10 flex items-center justify-center bg-white/10 text-white rounded-xl active:scale-90"><Icon path={Paths.Minus}/></button>
               <div className="flex flex-col items-center">
                  <span className="text-white text-[7px] font-black uppercase opacity-50 text-center">Scale %</span>
                  <input type="number" value={displayZoom} onChange={e => setTransform(p => ({...p, scale: (e.target.value/100)*baseScale.current}))} className="w-16 bg-transparent text-white text-center font-black text-xs focus:outline-none" />
               </div>
               <button onClick={() => setTransform(p => ({...p, scale: p.scale*1.01}))} className="w-10 h-10 flex items-center justify-center bg-white/10 text-white rounded-xl active:scale-90"><Icon path={Paths.Plus}/></button>
            </div>
          </div>
          <div className="w-full md:w-[380px] bg-white p-6 md:p-8 flex flex-col justify-between border-l border-slate-200 z-40 relative">
            <div className="space-y-6">
              <div className="flex justify-between items-center">
                <div className="flex items-center gap-0.5">
                   <div className="text-blue-500 flex items-center"><Icon path={Paths.Verify} size={22} className="fill-blue-500 stroke-white stroke-[1.5px]"/></div>
                   <h2 className="font-roboto-bold text-xl tracking-tighter leading-none">Jestudios</h2>
                </div>
                <button onClick={onCancel} className="p-2 bg-slate-50 rounded-full hover:bg-slate-100 transition-colors"><Icon path={Paths.Close} /></button>
              </div>
              
              <div className="space-y-4">
                 <div className="grid grid-cols-2 gap-3">
                    <div className="flex gap-1.5">
                       <button onClick={() => setTransform(p => ({...p, x: p.x - 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M15 18l-6-6 6-6"/></button>
                       <button onClick={() => setTransform(p => ({...p, x: p.x + 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M9 18l6-6-6-6"/></button>
                    </div>
                    <div className="flex gap-1.5">
                       <button onClick={() => setTransform(p => ({...p, y: p.y - 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M18 15l-6-6-6 6"/></button>
                       <button onClick={() => setTransform(p => ({...p, y: p.y + 1}))} className="flex-1 h-12 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center active:bg-slate-200"><Icon path="M18 9l-6 6-6-6"/></button>
                    </div>
                 </div>
              </div>
            </div>
            <button onClick={() => onConfirm(transform, paper)} className="w-full py-5 bg-black text-white rounded-xl font-black uppercase tracking-[0.1em] text-xs mt-8 active:scale-95 transition-all">Apply</button>
          </div>
        </div>
      );
    }

    function App() {
      const [garmentColor, setGarmentColor] = useState('black');
      const [selectedDriver, setSelectedDriver] = useState(null);
      const [uploadedImage, setUploadedImage] = useState(null); 
      const [rawImage, setRawImage] = useState(null); 
      const [processedImage, setProcessedImage] = useState(null); 
      const [isStudioOpen, setIsStudioOpen] = useState(false);
      const [isBgRemoved, setIsBgRemoved] = useState(false);
      const [isAutoFit, setIsAutoFit] = useState(false);
      const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
      const [paperSize, setPaperSize] = useState("A4");
      const [editorScale, setEditorScale] = useState(1);
      const [activeViewIndex, setActiveViewIndex] = useState(0);
      const containerRef = useRef(null);
      const fileInputRef = useRef(null);

      const VIEWS = ['front', 'back', 'detail', 'fabric', 'size', 'cta'];

      const descriptionText = `Bikin Formula 1 lebih populer dari MotoGP.
Capek nggak sih tiap ngobrol soal F1 sama orang baru, ujung-ujungnya mereka jawab, "Gue sih lebih ngikutin MotoGP."
bayangin kalau suatu hari lo keluar rumah, terus langsung tahu ada sesama F1 fans cuma dari kaos yang mereka pakai.
Itu yang kita bangun di JeStudios. 

Detail Produk
• Bahan 100% cotton (24s & 30s)
• Sablon digital print, detail tajam
• Regular fit modern, clean
• Adem, tidak mudah melar, warna awet

Catatan F1 Fans
• dibuat oleh fans F1, untuk Fans F1
• Cocok untuk race weekend, nobar, atau daily
• Bukan kaos pasaran

Perhatian
• Cek size chart, jangan salah pilih kayak Ferrari Strategist
• Stock ready, pit crew standby packing

Info Order
• Proses maks. 1×24 jam
• Barang sudah QC
• Minggu libur

Terima kasih sudah memilih JeStudios`;

      useEffect(() => {
        const updateScale = () => {
          if (containerRef.current) {
            const firstCanvas = containerRef.current.querySelector('.canvas-wrapper');
            if (firstCanvas) {
               const rect = firstCanvas.getBoundingClientRect();
               setEditorScale(rect.width / CANVAS_SIZE);
            }
          }
        };
        updateScale();
        const obs = new ResizeObserver(updateScale);
        if (containerRef.current) obs.observe(containerRef.current);
        return () => obs.disconnect();
      }, [isStudioOpen, selectedDriver]);

      useEffect(() => {
        if (!rawImage) return;
        const gen = async () => {
          const imgObj = new Image();
          imgObj.onload = () => {
            const activeImg = isBgRemoved ? processedImage : imgObj;
            if (!activeImg) return;
            const target = paperSize === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
            const tmp = document.createElement('canvas'); 
            tmp.width = target.w; 
            tmp.height = target.h;
            const c = tmp.getContext('2d');
            c.save();
            c.translate(transform.x, transform.y);
            c.scale(transform.scale, transform.scale);
            c.drawImage(activeImg, -activeImg.width/2, -activeImg.height/2);
            c.restore();
            setUploadedImage(tmp.toDataURL());
          };
          imgObj.src = rawImage;
        };
        gen();
      }, [rawImage, processedImage, transform, isBgRemoved, paperSize]);

      const handleUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const img = new Image();
          img.onload = async () => {
            setRawImage(ev.target.result);
            const proc = await createProcessedImage(img);
            setProcessedImage(proc);
            const bounds = detectContentBounds(proc);
            const target = (bounds.w > bounds.h) ? { w: A4.h, h: A4.w, name: "A4" } : { w: A3.w, h: A3.h, name: "A3" };
            setPaperSize(target.name);
            setTransform({ x: target.w / 2, y: target.h / 2, scale: 1 });
            setIsAutoFit(false);
            setIsBgRemoved(false);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      const toggleAutoFit = () => {
        if (!processedImage) return;
        const nextState = !isAutoFit;
        setIsAutoFit(nextState);
        const target = paperSize === "A4" ? { w: A4.h, h: A4.w } : { w: A3.w, h: A3.h };
        if (nextState) {
          const bounds = detectContentBounds(processedImage);
          setTransform({ x: target.w / 2, y: target.h / 2, scale: Math.max(target.w / bounds.w, target.h / bounds.h) });
        } else {
          setTransform({ x: target.w / 2, y: target.h / 2, scale: 1 });
        }
      };

      const copyDescription = () => {
        const el = document.createElement('textarea');
        el.value = descriptionText;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
      };

      const downloadMockup = async (viewsToDownload = VIEWS) => {
        for (const type of viewsToDownload) {
          if (type === 'back' && !selectedDriver) continue;
          if (type === 'cta' && !selectedDriver) continue;

          const canvas = document.createElement('canvas');
          canvas.width = CANVAS_SIZE; 
          canvas.height = CANVAS_SIZE;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = garmentColor === 'white' ? '#f8fafc' : '#f8fafc'; 
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          let src = `garment/garment-${garmentColor}.png`;
          let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
          if (type === 'back' && selectedDriver) { 
              src = `garment/garment-${garmentColor}-${selectedDriver}.png`; 
              pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 }; 
          }
          else if (type === 'detail') { 
              src = `garment/garment-${garmentColor}-detail.png`; 
              pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; 
          }
          else if (type === 'fabric') src = `garment-${garmentColor}-fabric.png`;
          else if (type === 'size') src = `size-chart.png`;
          else if (type === 'cta' && selectedDriver) src = `cta-${selectedDriver}.png`;

          const gImg = new Image();
          await new Promise(r => { 
              gImg.onload = r; 
              gImg.onerror = r; 
              gImg.src = src; 
          });
          if (gImg.naturalWidth) ctx.drawImage(gImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);

          if (type === 'front' && selectedDriver) {
             const dImg = new Image();
             await new Promise(r => { 
                 dImg.onload = r; 
                 dImg.onerror = r;
                 dImg.src = DRIVERS.find(d=>d.id===selectedDriver).image; 
             });
             if (dImg.naturalWidth) {
                 const driverRenderWidth = 650;
                 const driverRenderHeight = (dImg.naturalHeight/dImg.naturalWidth)*driverRenderWidth;
                 const drawX = -85;
                 const bottomOffset = CANVAS_SIZE * -1.30; 
                 const drawY = CANVAS_SIZE - driverRenderHeight - bottomOffset;
                 ctx.drawImage(dImg, drawX, drawY, driverRenderWidth, driverRenderHeight);
             }
          }

          if (uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail')) {
            const aImg = new Image();
            await new Promise(r => { aImg.onload = r; aImg.src = uploadedImage; });
            
            ctx.globalAlpha = 0.9;
            ctx.globalCompositeOperation = garmentColor === 'white' ? 'multiply' : 'screen';
            
            const h = (aImg.naturalHeight/aImg.naturalWidth)*pos.w;
            ctx.drawImage(aImg, pos.l, pos.t, pos.w, h);
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
          }

          const link = document.createElement('a');
          link.download = `Jestudios_${type}_${Date.now()}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          await new Promise(r => setTimeout(r, 400));
        }
      };

      const renderView = (type, index) => {
        let src = `garment/garment-${garmentColor}.png`;
        let pos = { l: (CANVAS_SIZE-PRINT_WIDTH_1)/2, t: PRINT_TOP_1, w: PRINT_WIDTH_1 };
        
        if (type === 'back') {
            if (!selectedDriver) {
                return (
                    <div key={type} onClick={() => setActiveViewIndex(index)} className={`canvas-wrapper relative bg-white w-full aspect-square flex flex-col items-center justify-center transition-all duration-300 shadow-sm rounded-xl cursor-pointer box-border ${activeViewIndex === index ? 'border-[3px] border-red-600 ring-2 ring-red-600/20 z-10' : 'border border-slate-200 hover:border-slate-300'}`}>
                        <span className="text-slate-400 font-medium text-xs md:text-sm tracking-wide text-center px-4">Select driver to view back</span>
                        {activeViewIndex === index && (
                           <div className="absolute top-2 right-2 bg-red-600 text-white p-1 rounded-full z-20 shadow-md">
                              <Icon path={Paths.Check} size={12} />
                           </div>
                        )}
                    </div>
                );
            }
            src = `garment/garment-${garmentColor}-${selectedDriver}.png`;
            pos = { l: (CANVAS_SIZE-PRINT_WIDTH_2)/2, t: PRINT_TOP_2, w: PRINT_WIDTH_2 };
        } 
        else if (type === 'detail') { 
            src = `garment/garment-${garmentColor}-detail.png`; 
            pos = { l: PRINT_LEFT_3, t: PRINT_TOP_3, w: PRINT_WIDTH_3 }; 
        }
        else if (type === 'fabric') {
            src = `garment-${garmentColor}-fabric.png`;
        }
        else if (type === 'size') {
            src = `size-chart.png`;
        }
        else if (type === 'cta') {
            if (!selectedDriver) {
                return (
                    <div key={type} onClick={() => setActiveViewIndex(index)} className={`canvas-wrapper relative bg-white w-full aspect-square flex flex-col items-center justify-center transition-all duration-300 shadow-sm rounded-xl cursor-pointer box-border ${activeViewIndex === index ? 'border-[3px] border-red-600 ring-2 ring-red-600/20 z-10' : 'border border-slate-200 hover:border-slate-300'}`}>
                        <span className="text-slate-400 font-medium text-xs md:text-sm tracking-wide text-center px-4">Select driver to view CTA</span>
                        {activeViewIndex === index && (
                           <div className="absolute top-2 right-2 bg-red-600 text-white p-1 rounded-full z-20 shadow-md">
                              <Icon path={Paths.Check} size={12} />
                           </div>
                        )}
                    </div>
                );
            }
            src = `cta-${selectedDriver}.png`;
        }

        const showArt = uploadedImage && (type === 'front' || (type === 'back' && selectedDriver) || type === 'detail');

        return (
          <div 
            key={type} 
            onClick={() => setActiveViewIndex(index)}
            className={`canvas-wrapper relative bg-white w-full aspect-square overflow-hidden transition-all duration-300 shadow-sm rounded-xl cursor-pointer box-border ${activeViewIndex === index ? 'border-[3px] border-red-600 ring-2 ring-red-600/20 z-10' : 'border border-slate-200 hover:border-slate-300'}`}
          >
            {activeViewIndex === index && (
               <div className="absolute top-2 right-2 bg-red-600 text-white p-1 rounded-full z-20 shadow-md">
                  <Icon path={Paths.Check} size={12} />
               </div>
            )}
            
            <div style={{ width: CANVAS_SIZE, height: CANVAS_SIZE, transform: `scale(${editorScale})`, transformOrigin: 'top left', position: 'absolute', top: 0, left: 0 }}>
              
              <img src={src} className="w-full h-full absolute inset-0 object-cover pointer-events-none" />
              
              {type === 'front' && selectedDriver && (
                <img src={DRIVERS.find(d=>d.id===selectedDriver).image} className="absolute pointer-events-none" style={{ width: 650, left: -85, bottom: '-130%', zIndex: 5 }} />
              )}
              
              {showArt && (
                <div className="absolute" style={{ left: pos.l, top: pos.t, width: pos.w, zIndex: 10 }}>
                  <canvas ref={el => {
                    if (el && uploadedImage) {
                       const c = el.getContext('2d');
                       const i = new Image();
                       i.onload = () => {
                          el.width = pos.w; 
                          el.height = (i.naturalHeight/i.naturalWidth)*pos.w;
                          c.clearRect(0,0,el.width,el.height);
                          c.globalAlpha = 0.9;
                          c.globalCompositeOperation = garmentColor === 'white' ? 'multiply' : 'screen';
                          c.drawImage(i, 0, 0, el.width, el.height);
                       };
                       i.src = uploadedImage;
                    }
                  }} className="w-full pointer-events-none" />
                </div>
              )}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
          {isStudioOpen && <ArtworkStudio rawImage={rawImage} initialTransform={transform} initialPaper={paperSize} isBgRemoved={isBgRemoved} onConfirm={(t, p) => { setTransform(t); setPaperSize(p); setIsStudioOpen(false); }} onCancel={() => setIsStudioOpen(false)} />}

          {/* Grid Canvas Area */}
          <div className="flex-1 w-full overflow-y-auto px-4 pt-4 pb-20 md:pb-6 flex items-center justify-center">
            <div ref={containerRef} className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 w-full max-w-screen-xl mx-auto">
              {VIEWS.map((v, i) => renderView(v, i))}
            </div>
          </div>

          {/* Bottom Inline Controls Area */}
          <div className="w-full bg-white p-3 md:p-4 flex flex-col z-40 border-t border-slate-200 fixed bottom-0 md:static shadow-[0_-10px_40px_rgba(0,0,0,0.05)] md:shadow-none">
            <div className="flex flex-col gap-3 max-w-screen-2xl mx-auto w-full">
              
              {/* Row 1: Configurations (Colors + Drivers) */}
              <div className="flex overflow-x-auto hide-scrollbar items-center gap-3">
                <div className="flex gap-2 border-r border-slate-200 pr-3 shrink-0">
                  {['black', 'white'].map(c => (
                    <button key={c} onClick={() => setGarmentColor(c)} className={`w-10 h-10 rounded-full border-4 transition-all duration-150 ${c === 'black' ? 'bg-black' : 'bg-slate-50'} ${garmentColor === c ? 'border-red-600 scale-110' : 'border-slate-100 hover:scale-105'}`} />
                  ))}
                </div>

                <div className="flex gap-3 shrink-0 py-1">
                  {DRIVERS.map(d => (
                    <button key={d.id} onClick={() => setSelectedDriver(d.id)} className={`relative w-[44px] h-[44px] rounded-full shrink-0 transition-all duration-150 overflow-hidden ${selectedDriver === d.id ? 'ring-[3px] ring-red-600 opacity-100 z-10 scale-110' : 'opacity-80 border border-slate-200 hover:scale-105 hover:opacity-100'}`}>
                      <div className={`absolute inset-0 ${d.color}`} />
                      <img src={d.image} className="absolute top-[10%] w-[55px] left-1/2 -translate-x-1/2" />
                    </button>
                  ))}
                </div>
              </div>

              {/* Row 2: Inline Actions (Upload, Downloads, Copy) */}
              <div className="flex flex-wrap lg:flex-nowrap gap-2 items-stretch">
                <div className="flex-1 min-w-[250px]">
                  <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleUpload} />
                  {!rawImage ? (
                    <button onClick={() => fileInputRef.current.click()} className="w-full h-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 flex items-center justify-center gap-2 group hover:bg-slate-100 transition-colors">
                      <Icon path={Paths.Upload} size={16} className="text-slate-400 group-hover:text-blue-500 transition-colors" />
                      <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 group-hover:text-black transition-colors">Upload Artwork</span>
                    </button>
                  ) : (
                    <div className="flex h-12 w-full rounded-xl overflow-hidden border border-slate-200 shadow-sm bg-white">
                      <button onClick={() => fileInputRef.current.click()} className="flex-1 flex items-center gap-2 bg-white px-3 border-r border-slate-100 hover:bg-slate-50 transition-colors overflow-hidden">
                        <div className="w-6 h-6 rounded border border-slate-100 overflow-hidden shrink-0 bg-white">
                          <img src={uploadedImage} className="w-full h-full object-contain" />
                        </div>
                        <p className="text-[9px] font-black uppercase tracking-tight text-slate-800 truncate">Replace</p>
                      </button>
                      <button onClick={toggleAutoFit} className={`w-12 border-r border-slate-100 flex items-center justify-center transition-all ${isAutoFit ? 'bg-white text-black' : 'bg-white text-slate-300'}`} title="Auto Fit">
                        <Icon path={Paths.Expand} size={14} />
                      </button>
                      <button onClick={() => setIsBgRemoved(!isBgRemoved)} className={`w-12 border-r border-slate-100 flex items-center justify-center transition-all ${isBgRemoved ? 'bg-white text-black' : 'bg-white text-slate-300'}`} title="Remove Background">
                        <Icon path={Paths.Eraser} size={14} />
                      </button>
                      <button onClick={() => setIsStudioOpen(true)} className="w-12 bg-white flex items-center justify-center active:bg-slate-50"><Icon path={Paths.Edit} size={14} className="text-slate-400 hover:text-black transition-colors" /></button>
                    </div>
                  )}
                </div>

                <div className="flex w-full lg:w-auto gap-2 shrink-0">
                  <button onClick={() => downloadMockup([VIEWS[activeViewIndex]])} className="flex-1 lg:flex-none h-12 px-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-[0.1em] active:scale-95 transition-all flex items-center justify-center gap-1.5">
                    <Icon path={Paths.Download} size={14} /> Ini Saja
                  </button>
                  <button onClick={() => downloadMockup(VIEWS)} className="flex-1 lg:flex-none h-12 px-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-[0.1em] active:scale-95 transition-all flex items-center justify-center gap-1.5">
                    <Icon path={Paths.Download} size={14} /> Semua
                  </button>
                  <button onClick={copyDescription} className="flex-1 lg:flex-none h-12 px-4 bg-white border border-slate-200 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-[0.1em] active:scale-95 transition-all flex items-center justify-center gap-1.5">
                    <Icon path={Paths.Copy} size={14} /> Copy
                  </button>
                </div>
              </div>
              
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
